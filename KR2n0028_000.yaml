  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0028_WYG_000-1a, image: WYG0683/WYG0683-0025a.png}
body:
  text: 名迹録目録類二金石之屬提要臣等謹案名迹録六卷附録一卷明朱圭編圭字伯盛崑山人舊本或題曰元人觀其首列洪武二年崑山城隍神誥升於元代璽書之上即徐堅作初學記以唐太宗詩冠前代諸詩之例其為明人確矣稱元人者誤也圭善篆籀工於刻印楊維楨為作方寸鐵志鄭元祐李孝光張翥陸友仁謝應芳倪瓉張雨顧阿英諸人亦多作詩歌贈之又工於摹勒石刻因裒其生平所鐫編為此集題曰名迹者其序謂取穆天子傳為名迹於弇茲石上之義然穆天子傳稱乃為銘迹於元圃之上其字作銘不作名且今弇兹又稱乃記其迹於弇山之石亦無名字不知所據何本也漢代諸碑多不著撰人書人刻工尤不顯名氏自魏受禪碑邯鄲淳撰文梁鵠書鍾繇刻字是為士大夫自鐫之始歐陽修趙明誠等輯録金石僅標題跋尾而已自洪適隸續備列碑文是為全録刻詞之始若自刻其字而自輯其文為一書則古無此例自圭是編始也首誥一篇御製祭文五篇璽書七篇蓋尊帝王之作不敢與臣庶相雜雖篇頁無多而自自為一卷用元好問中州集冠以御製兩頁自為一卷例也次碑十四篇記二十九篇墓表一篇墓碣五篇行狀一篇壙志二十三篇墓志銘二十四篇雜刻字畫二十六種末為附録一卷則皆一時贈言也原目注缺者凡石室銘三佳銘靈槎詩柯敬仲題桃花鳥詩四篇今有録無書者又御製祭文五篇璽書七篇碑八篇記十四篇碣一篇行狀一篇壙志十四篇墓志銘二篇雜刻六種其元故處士易府君壙志一篇在故宜人李氏壙志前而目録列青村場典史沈公壙志後又金粟道人顧君墓志銘後有故王子厚墓志銘一篇而目不載蓋傳寫訛脫非其舊本矣魏張晏注史記儒林傳據伏生碑知其名勝晉灼注漢書地理志據山上碑知黎陽在黎山之隂其曰陽者兼取河水在其陽之義唐司馬貞注史記髙祖本紀據班固泗上亭長碑知母媪當為母溫宋方嵩卿作韓文舉正亦皆以石本為據而歐陽趙洪諸家以碑證史傳舛誤者尤不一而足是編所録皆圭手鐫固愈於年紀綿邈搜求於磨滅之餘者如元末郭翼諸書載其洪武中出為學官非得是書載盧熊所作翼墓志不知其卒於至正二十四年未嘗改節仕明也足見其有資考證矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書史部十四名迹録目録目録類二金石之屬卷一誥命崑山縣城隍之神誥碑銘江浙行省右丞嶽實珠公去思碑奉議大夫崑山州知州王公去思碑海道都漕運萬户府達嚕噶齊托音公政績碑崑山州重修東嶽廟碑重修靈慈宫碑鄭東崑山州重修學宫碑楊維楨記崑山州重修學宫記李孝光崑山州重修儒學記李祁啓聖廟新建宗魯書孰記周伯琦崑山州重修三皇廟記陳秀民卷二記崑山州重修永懷報德禪寺記劉景元豐兆院記大寶洲記瑞雲精舍記鄭東無倪舟記鄭東崑山州知州史侯生祠記鄭東直沽龍祠記鄭東海曙樓記鄭東聽海軒記花雨軒記張紳花雨軒記秦約卷三墓表宋劉龍洲先生墓表楊維楨墓碣元故朝請大夫溫州路總管陳公墓碣銘楊維楨故殷處士碣銘楊維楨元故曹母碣銘鄭東故孺人陶氏碣銘錢逵壙志元故希古道人朱公壙志故處士吕府君壙志元故雲濤處士濮陽吳君壙志元故處士易府君壙志故宜人李氏壙志故從仕郎吉水州判官易府君壙志故青村場典史沈公壙志元故海道千户曹君壙志故徐氏孺人壙志卷四墓志銘楊履齋先生墓志銘鄭東金粟道人顧君墓志銘自製故王子厚墓志銘盧熊元故處士陳君墓志銘章母墓志銘鄭東故處士夷孝先生盧君墓志銘申屠衡元故遷善先生郭君墓志銘盧熊元故靖夷先生顧君墓志銘故朱徴士墓志銘殷奎故處士傳君墓志銘殷奎盧府君妻王夫人墓志銘殷奎序曹亨銘孫君墓志銘故劉府君妻盧氏墓志銘盧熊故俞府君墓志銘盧熊周府君墓志盧熊故間邪居士楊君墓志銘殷奎周伯延墓志銘盧熊故張公墓志銘袁華楊子經墓志銘盧熊故處士唐君墓志銘闕錢瑞妻章氏墓志銘盧熊卷五雜刻快哉亭帖拜石壇記顧阿瑛竒石銘陸友仁題拜石壇詩二袁華顧阿瑛金粟道人小像贊倪瓉絶句自題􅐩溪樓詩戒石銘天蓬贊楊維楨竇諌議隂德跋王思義梅溪説黃潛實際川禪師影堂逸事松月道人正印祕閣銘盧熊簫銘東維叟鏡銘鄭東拄杖銘倪瓉卷六附贈言贈朱伯盛詩序鄭東張雨七言絶李孝光七言絶鄭元祐七言律倪瓉五言律郭翼七言律顧阿瑛七言絶四首並跋陳世昌五言長律盧熊七言律釋清欲釋智寬方寸鐵志楊維楨銘陸友仁謝應芳頌秦約詩邾經張昱元鼎陸居仁錢惟善靜寄軒詩三首雲林子朱伯盛甫小像贊倪瓉殷奎印文集考序盧熊跋二張紳字原表目跋盧熊字原音訓跋盧熊題朱伯盛所藏吳孟思三體心經張翥邾經陳世昌清欲偈二顧阿瑛清欲
