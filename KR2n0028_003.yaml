body:
  text: 名蹟録卷三明朱圭編墓表宋龍洲先生劉公墓表先生名過字改之廬陵人宋以詩俠名湖海間陳亮陸游辛棄疾世稱人豪皆折氣岸與之交丞相周必大聞其人欲客之門下不就故人潘友文宰昆山縣延致先生先生雅志欲航海因抵縣留宿焉先生卒縣主簿趙希楙以友文所賻錢三十萬緡買地馬鞍山以葬遂立祠東齊久而墓與祠俱廢更一百四十餘年為至正十三年州人顧瑛秦約盧熊等聞之州州下其事徴諸圖籍正其厲域表大石其上題曰宋龍洲先生劉公之墓越六年寺僧盜葬其所今知州費侯復初令下僧遷骼復其墓且表樹焉遣客殷奎謁豫求表墓詞豫昔往來婁間屢詢其遺墓弗得今幸墓復豫何辭於言或謂公一窮詩流且其詩又局於季宋陋習僅如五季羅昭諫爾何以表樹後人哉豫曰不然取人以詞不若以節裁公嘗抗疏光宗請過宫屢與時宰陳恢復方略勇請甲兵謂中原可一戰而取不用去正類昭諫力勸錢尚父以春秋討賊之義義士為之激立可以詞客少之乎吾以是復奎使歸告費侯刻石為表大元至正草一年冬十月五日奉訓大夫江西等處儒學提舉楊維楨撰將仕郎杭州路海寧州判官禇奐書墓碣元故朝請大夫溫州路總管陳公墓碣銘陳氏出舜後胡公滿以國為氏公之來裔莫詳譜牒世居昆者祖諱信亞中大夫同知浙東道宣慰司事輕車都尉追封潁川郡侯父諱允恭嘉議大夫平江路總管上輕車都尉追封潁川郡侯皆公推恩所覃也公儀表魁壘遇事沈密而果決其開誠下士則洞見肝膽平居好古健遊覽嘗不逺千里登泰山日觀南上武當絶頂觀銅柱東航海謁普陀大士像皆若有所遇至正五年間詔下輸粟於邊者授官公以粟授於潛縣稅使遷晉江升牛田司丞十五年淮兵南下幸仕者相鳴而起皆奊詬亡賴公獨逃禍民伍越三年間走京都挾粟數萬斛濟國餉大臣梯之見天子天子旌其義授宣武將軍同知韶州路總管府事未行明年薦授朝請大夫溫州路總管兼勸農防禦事又明年到郡郡方以民力捍城飢死者相枕藉城下公下令發廩及私帑計丁雇役民趨者如市城塹不日成前政督秋稅以家量收病民甚公亟易之閲三月政平頌作秋九月遽以疾終二十二年夏五月孫男經奉函骨航海歸是年八月十二日葬於馬鞍山先塋之左公諱志學字俊卿娶顧氏蔣氏並封潁川郡夫人子男三人長逢祥江陰州申港巡檢次逢吉江浙行樞院都事逢原水軍都府萬户孫男九人孫女七人俱在稚逢祥衷衰來拜余門曰士附青雲屬之王公大人而身後聲光著白不朽則必托一代之巨手筆先子幸附青雲有祿位不幸卒海邦數千里外不能如禮葬乃子孫罪又不得巨手筆如先生夀吾存沒非重不幸歟幸哀而賜之銘豫與公為甲庚友者二十年辭不可遂為銘曰貴與富不兩完窖金匱玉褐蓋棺仁人富不以私補吾國漕賑我以歲飢要銀艾佩銅虎爾兵爾農子聽父堡障立梁柱傾天不假以三年成孫㷀㷀齒未丁護喪航海海砥平玉之龍氣蔥蔥白鶴歸來語長松城郭徙井邑改楊子作銘銘有在賜進士出身奉訓大夫前江西等處儒學提舉楊維楨撰盧熊書元故殷處士碣銘至正草二年九月癸卯朔十有八日庚申吳郡殷奎葬其父雍逸處士之柩於崑山先塋之次既葬樹碣墓道而請其師東維叟為之銘處士名庠字君序其先華亭人居崑山者再世矣崑俗喜貨殖類蓄髙資遺子孫處士哂曰資多愚子孫且賈禍何用哉聖賢之學達可庇民物窮亦善一身敇其子奎不逺數百里從豫遊一州皆笑以為迂處士不為變益市書築室使卒業豫已喜處士之志果確而奎亦謙厚雅飭刻意古學豫於是又喜處士之願克有遂也始處士少時即以長子任家督弗及於學然其天質之美孝友忠信自有絶人者既壯間觀古書傳求其人行事施諸家父性嚴處士事之竭力能得其歡心遇子弟恩意篤至周人急無所吝雖負之不校其葬親勿襲夷鬼俗委水火君子稱之故其歿也人多哭之哀處士享年五十有七士君子誄其行者私諡之曰雍逸處士曽祖萬采嘉興節制幹官王父澄父子湮皆抱德不仕娶王氏宣政院宣使忠仁女子四人女二人孫男六人奎其冡子也殷氏三世有德而無祿四世而昌意其在奎乎乃為之銘以俟銘曰生不榖死不夀德則富惟其不有以遺後會稽楊維楨撰豐城余詮書彭城錢逵篆額至正草三年十一月九日甲戌男奎璧箕亢等立元故曹母碣銘維曹元達庶母吳年五十二歲喪於賊而不得斂將窽墓納棺衣而葬焉乞銘於其友昆陽鄭東曰幸不沒母善且使後世不為虛墓也於乎元達之志可悲也已母諱某家世業農居徽之休寧金竹村母幼鞠於嫡外家汪氏年十五從嫡歸於曹先生某先生卒母哭之喪明時年二十有八至正十一年賊發汝潁南延江東饒徽間初賊逼徽境上家人欲負母出母曰君宜盡引去先人木主不可無守也且賊亦人耳顧我盲廢人何忍殺吾果幸得免十二年正月十七日賊又卒至家人倉皇四出賊以刃臨母曰能盡出篋藏可無死也母曰吾家世業儒苐存先人敝廬及多書耳餘無有也賊怒竟殺母及其孫國賓親戚童婢同時死者三十三人賊退家人歸求遺尸衆骨橫地莫辨其為母矣初母從嫡于曹能任治婦事而嫡不勞性不喜浮飾每服布綈猶以為過曹先生卒其兄欲奪嫁之母指天日自誓無他生子二人曰天德宜德天德即元達也時皆尚幼今其能讀書自立為世儒皆素教之力也天德娶孫氏生子二人曰泰安普安女二人宜德出贅孫氏生子一人曰關住女五人又曰奎德者天德之兄嫡汪所出也生子二人曰國寶國定元達及冠時貧無以養負奇氣裹糧吳楚之間從時名貴人遊時客髙郵間賊陷饒徽甚危急亟至杭遇阻不得往江淮反覆計之乃詣大官請身為士卒由行間以往大官見天德狀魁岸且出言甚文疑其為間諜將殺之會有識元達者得救免由是竟不得歸明年賊破徽家殘母已亡於乎命也夫銘曰天髙高勿可求降淑媛覆用仇竟死變子莫收薶衣冠垂千秋於乎是為曹母之丘昆陽鄭東造濮陽吳睿書故孺人陶氏碣銘孺人諱安垕姓陶氏世為蘇州人宋奉議郎諱璹之曽孫登仕郎諱伯柟之孫封從仕郎太平路繁昌縣君諱愈之仲女曽祖妣朱氏祖妣張氏妣宜人張氏也孺人生於至元十九年六月丁巳年二十有四而為辰州路儒學正同郡錢君良傅之配端重有威識勤不妄用奉舅姑以禮承其夫以順訓飭子女以嚴事上撫下悉有章序晚年好誦佛書預為送終之具纎悉畢備故其內外宗姻莫不稱其能洪武二年正月辛酉卒于昆山仲子述之家享年八十有八子男二人曰通曰述女一人曰惠柔適醫學提舉張元善孫男六人晉益復升觀恆女六人淑安淑賢淑惠淑貞壻曰嚴元裕徐天德周文瑩張天瑞淑能淑仁未嫁曽孫男七人女一人是年三月丁酉祔于吳縣靈巗鄉黃山徐涇先塋學正君之墓至是學正君之亡已有三年矣學正君之猶子逵銘其壙石曰九十其夀康且年也有子有孫孫多曽也善積于身垂後昆也有信不信視兹刻文也錢逵撰并書壙志元故希古道人朱公壙志先考諱旭姓朱氏字子陽號次山一號希古道人世居揚州崇明之西沙里至元丁亥遷于吳郡崑山之太倉曽祖諱禮妣陳氏祖諱智妣章氏陳氏考諱文清資德大夫大司農河南江北等處行中書省左丞妣邾氏先考性簡重識量宏逺孝以事親順以事長教子孫以義及鄉黨以惠處富貴淡如也大父左丞公以忠勇之姿委質戮力於宋革命之時首創海運勳業著于朝時大臣知先考之才聞于上至元癸巳降金符授忠顯校尉海道運糧千户蒞官以公正上嘉其能賜以金緞秩滿不樂仕進退居田里構園池樹藝花竹匾其室曰樂善日與賢士大夫游鄉人死無殮者則買棺瘞之貧無以禦寒暑者則製帳并綿纊施之大德辛丑秋七月風潮西沙飄蕩民廬死者八九而存者無以舉火先考運米千石往濟之有田數十頃歲少稔勿入其租吳郡三皇廟及𤣥妙觀鐘樓圯于風雨作而新之其樂施類如此先考性好學素尚儒雅博涉經史尤長于小楷篆𨽻章草早歲從趙文敏公遊已有能書稱晚年深造晉唐筆法之妙家藏法書名畫古器皆神品至正元年辛巳八月二日丁未以疾卒于家屬纊不亂惟戒子孫曰吾死勿狥流俗用浮屠法惟事葬祭之禮足矣言訖而逝於乎痛哉先考生於至元十五年戊寅九月九日享年六十有四娶同郡虞氏子男四人長曰明德娶顧氏次曰明善有疾未娶次曰希賢贅平氏次曰明達贅虞氏明德明善虞出也女四人孫男四人長曰拜布哈從仕郎婺州路蘭溪州判官次曰兼善曰善慶曰觀善孫女十一人曽孫女三人明德等忍死以是年九月八日癸丑葬于昆山賈岡原先塋之次日薄事嚴未暇干銘當世大手筆姑叙歲月納諸壙云孫子朱明德等泣血百拜謹志朝列大夫平江路昆山州知州兼勸農事孟鼐瑪岱填諱故處士吕府君壙志先君諱德茂字茂卿世系自西嶽得姓至東萊伯恭氏之後為吳人永嘉李五峰先生嘗為文序其譜曽祖考缺餘慶流祖藴而未發父端號松岩初試昆山掾及授汳梁稻田提舉生先君女子五人先君年十四喪親獨養于母讀書習吏事不煩責教強志自立先世富有藏積時宋氏李氏姊長先君固讓獨取書數百卷曰是遺子孫足矣姊妹遺諸孤擇師教之資其嫁娶喪死恤其家勿替父母喪哀痛而不踰禮人益稱之皇慶二年徙州家婁水上田壤益以廣俄燬于災堂宇深斥大之尤為宏逺事母終始致孝好施豫為友為義緩急叩門如取水火歲大疫鄉鄰有至親不往過者先君軫其寒飢家至户到多所全活晚年恬無仕進意常訓諸子曰吾少孤奮勵成家又有賦役日夜竭吾心思勞吾躬而至于斯歲廩之入可以供祭祀燕賓客鄉里之老南閻北閭杖履可往來也若等服習文學學所以敬親親賢之道吾宗為不墜矣於乎痛哉至正乙酉三月病痿痺疾凡禱祀醫餌不驗其年十一月一日終于家年五十三配唐氏子男五人曰誠次本文已娶恭尚幼長女年若干先卒壻茅世顯庶子信女某誠娶邵氏無子早喪孫男二人又明年丁亥十月十七日葬惠安鄉古塘北岡之原遂遷祖松岩君祖妣楊為昭穆相向以冡婦缺氏祔誠負大不孝未獲寸祿以飬越二年不克葬葬且事嚴未暇乞銘于當代儒先含哀忍死述其大者納諸壙孤子誠泣血百拜謹志前進士承事郎台州路天台縣尹兼勸農事楊維禎填諱袁華書元故雲濤處士濮陽吳君壙志先人諱睿字孟思姓吳氏其先世為開封人六世祖諱忠宋宣和間充殿前司統制官扈從髙宗南渡遂居于杭髙祖諱永昌左武大夫忠州防禦使曽大父諱佐宋承信郎充御前東庫使臣大父諱清宋成忠郎充殿前都指揮使帥僉父諱埴宋德祐初以京官子弟恩例授迪功郎時年十四越歲餘宋主內附拘集近世子姪入都先祖亦在其列留都下凡十年至元間回錢塘遂無意進取唯耽嗜法書古刻以自娛暮年號養素處士先祖生于宋景定辛酉歲五月七日以有元至正九年己丑歲十二月二日考終得年八十有九祖妣王氏先卒二十有六年得年五十有一同以至正十年庚寅歲二月十六日卜葬于湖州武康縣封禺山之原先祖凡有三男子而先人居長焉先人娶新城徐氏于至順二年壬申歲四月草八日卒年三十有九先人自幼雅尚古文篆籀之學凡六書原委靡不究探志樂山水清幽嘗自號為雲濤散人不幸以至正十五年三月草三日以疾卒于崑山之寓舍於乎痛哉先人生于大德戊戌歲五月三日丑時至是得年五十有八子男一人名昭以是年四月二十八日甲申歸葬于武康縣封禺山祖塋之原於乎痛哉日薄未能乞銘于當代立言君子以傳不朽姑托卒葬歲月納諸幽室孤哀子昭泣血謹志友生薊丘楊中填諱元故處士易府君壙志府君諱思義字宜中其先吉安廬陵人祖諱斗元宋咸淳進士迪功郎平江路常熟縣尉攝警昆山遂家焉父諱偉皇朝從仕郎吉安路吉水州判官致仕母李氏府君孝慈溫恭出乎天性𨼆德勿耀恬然終身生于至元己丑十月十二日歿于至正癸卯正月十二日以是月十七日戊午祔葬于馬鞍山先塋之側娶同郡長洲王洪女先府君七年卒子男五人鼎恆皆王氏出關孫徙孫獒孫關徙孫皆早世女一人適王懋功孫男二人女四人葬有日孤子鼎忍死泣血書梗槩納諸壙豫章陳增填諱故宜人李氏壙志宜人諱貞順字㢲卿姓李氏居吳之昆山大泗里世為上族乙亥冬天兵南下家牒遺逸故曽大父大父諱官無所考父興龍字漢卿號慤齊宋太學生也會我父以江西戊辰進士尉常熟秩滿攝警昆山歸順事定先妣以疾殂得地于馬鞍山西葬而家焉慤齊與先人善幼年以君許嫁於我庚辰五月先人以疾卒合葬先妣墓至元甲辰冬而翁不渝初言克合二姓君初歸我嘗以不及奉舅姑為憾至是供祭祀睦宗姻撫諸子克勤儉莫不盡禮天性然也至大己酉夏吳之文學始以我備儒吏貢于郡旋調嘉禾升浙淮鹺臺至江淮府史南省三擢州縣幕官皆及代乃被台州臨門巡檢之命在官未久年至申請授從仕郎吉安路吉水州判官致仕恩例封君宜人首尾宦遊三十六年清苦自持生事益艱日贍數百指得不困乏皆君助也暮年築室昆山以便拜掃戊子春季子好禮為毗陵郡吏明年奉親就養不逾歲君忽嬰疾五日而卒實庚寅二月二十七日壬子也生于宋咸淳庚午六月二十七日乙未享年八十有一子男五體仁思義好禮近智履信以時擇配非苟女二長適嘉禾王蘭孫次贅湖南帥掾四明陳秀民內外嫡庶孫男十九女十一曽孫男三女五人於乎吾與君共處六十五年賓對若一日目見四世又將有婚嫁者復何恨焉所恨君之亡也先一夕飲食談笑如常日黎明乃疾疾即篤緒言遺念皆不及矣伉儷之情悼痛之懷其能既乎乃率諸子扶柩歸崑山卜以是年六月十三日丙申祔葬于先塋之麓夫易偉因述梗槩內諸壙幽文正公八世孫將仕佐郎平江路儒學教授范文英填諱故從仕郎吉水州判官易府君壙志府君諱偉字成大號兼山先世長沙瀏陽人逺祖雄東晉舉孝亷為舂陵令死王敦之難及五代子孫遷廬陵五世從祖祓貴顯趙宋世由太學釋褐纍仕至禮部尚書髙祖嘉謨靜江府司户曽祖應云知靜江府義寧縣父斗元平江常熟尉皆以科第進尉秩滿攝昆山天朝革命就家焉府君幼失怙恃負氣積學卓以成立既强仕困于無資援不能自致乃嘆曰凡可以有為則為之即試吏平江再調嘉興升浙運泉台州臨門巡檢年及致仕即任告老升從仕郎吉安路吉水州判官致仕居閒置散惟早暮以禮法繩子孫以論議商古今接親友諧以言笑理情性作為歌詩仕不剛撓退乃順居如是而已府君生宋咸淳丁卯三月二十有九日歿今至正十四年甲午六月十一日是日命子孫來前語之曰吾以考終奚憾焉汝子若孫克率常訓吾死且安逝矣遂卒年八十有八其年六月草四日葬昆山馬鞍山西合封宜人李氏墓距縣尉君墓五步府君娶昆山大泗里宋太學生慤齊李公之女先府君五年卒子男五人體仁思義好禮近智履信女二人長適嘉禾王蘭孫次贅慶元陳秀民掾湖南帥府為之內外孫男二十人女十一人曽孫男四人女四人將封諸孤泣血謀曰府君修德勤事孰敢泯墜當乞銘昭代縉紳以著其實謹述大槩納諸斧屋大中大夫前海北廣東道肅政廉訪使陳允文填諱故青村場典史沈公壙志先考諱仲字長卿姓沈氏梅溪自號也世居越之餘姚龍泉鄉祖考諱缺祖諱震字東甫妣王氏先考剛直好義不妄交家貧乃謀升斗之祿以養由巡司鹽場縣吏後奉浙江省檄升吏平江府又調杭州考滿授松江六日享年三十八二十四年甲辰夏六月草八日函骨葬于馬鞍山文筆峰下先塋中之右先考娶崔氏瞿氏子男五人長樞一十四歲先以治命定婚嘉定大場東陽沈氏次機綱常璫子女三人長妙賢九歲先以治命許適昆山沛國朱氏次妙德安安孤子樞泣血謹志博陵林龍填諱元故海道千户曹君壙志先考諱圭字德璋姓曹氏海虞人海道都漕運副萬户諱南金之孫贈奉訓大夫徽州路婺源州知州諱文華之子生而頴異早喪父自能奮立襲大父恩授忠翊校尉海道香糯所千户佩金符在官二十年部餉航海者凡八上至正乙未以漕事如京適罹兵亂遇冦北通州不屈而死時至正己亥二月十五日也即藁葬于州北水涵寺之側若干步年五十一有男三人長𤣥次立次亨女四人孫男一人曰遷女一人嗚呼世路􅮟巇𤣥等負罪未能奉其骨以歸瘞姑鑿窽於虞山新塋以俟時寧哀哉至正二十六年龍集丙午夏四月孝子𤣥等泣血百拜謹志傅㪺填諱元故徐氏孺人壙銘徐氏諱永貞常熟人父諱元震母陸氏為同里曹𤣥妻卒于至正十九年九月草一日年三十歲子男一人曰遷女一人曰幼華至正草六年四月草一日自虞山之右遷葬于山之陰其夫為之銘曰前汝姑後汝娣從之居即庭內至正丙午夏四月志名蹟録卷三
