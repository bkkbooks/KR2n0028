body:
  text: 名蹟録卷二明朱圭編記重修永懷報德禪寺記吳城之東百里內有屬州曰崑山州故治西偏有寺曰永懷其州之東濵海帶河墊下湫隘祇林寺基亢爽明塏實經始之善規也按舊記寺建肇於宋政和間有僧義明闡法於斯聲動遐邇聞者樂施厥積既羡乃作殿宇行人道川率邑人沈饒輒為募四方之尊信象教者承以法堂翼以兩廡表以諸天之閣而寺之規制粗備至南渡建炎參政王公欲以此寺為奉先之所遂請於朝因敇改賜額為永懷報德禪寺越二百餘載日就靡夷凡規制之所存者惟大雄氏殿巍然丹堊漫漶將至廢弛為住持者莫有為起廢之圖而其衆往往散之四方逮皇元癸酉改元之嵗浙西江東道廣教府移檄本郡以嶽雲望禪師領之既至慨然曰吾為釋氏徒居釋氏宫起廢之責顧不在我而誰歟先是寺之土田質貸久不能復倉廪虛罄而廢加甚師乃力自奮厲夙興夜寐銖積寸纍毫髮略不以私口體奉由是稽質貸之嵗月恆以福報因果之說開諸人未能率化則出所積以贖之則質貸者歸虛罄者實然後度資計庸庀工鳩材外自三門兩廡庋經之藏撞鐘之樓圓通之殿水府之祠內暨法堂丈室與夫選佛之場儲資之庫下及庖湢圊溷寺之周圍隄岸城牆一撤而新之閣之初建井植四楹今則耦四楹而廣植焉閣之左右後創二樓相照以弼之則翬蜚敞豁金碧燀烜而已俶工於乙亥之秋落成於乙酉之夏於是棟宇隆厚上下完固輪奐礱緻之美燦然不失舊規四散之衆復集相與喜曰我等厯雲水見名山大剎之偉壯未嘗不內顧而興願念不圖今日見永懷之重新也遂合辭走武林屬余文以記之夫天下之事物無巨細惟誠可致仰慕佛氏之道微妙宏博天地所不能容聖智所不能窮其為道勇猛精進心所趨者不退轉卒以成佛况寺之興乎且昔之尸此者豈不知廢之不興為已病此乃誠不屬故坐視嵗月之遷而徒已焉今永懷之重興庸詎非望師一念之誠哉故樂然敷其梗槩而為之記載諸石以夀其傳庶為來者鑒毋隳厥緒焉可忽諸師諱道望台之臨海人姓項氏世為儒官得法於寶寧古林之嫡嗣嶽雲其號云至正七年七月既望鄞劉景元記大中大夫祕書卿台哈布哈書豐兆院記吾聞佛氏之於其道也必深造超詣盡得其師之說而後止故常去父母親戚斷割情戀不使外物騷亂其心腸二三其思慮則庶乎其有得矣然居不可以無宫室也饑不可以無菽粟也寒不可以無布帛也相生相養之道有終不得而廢矣故必有上棟下宇之制以却風雨寒暑必有園田生産之利以備饑食寒衣夫既足矣又不能無出入冦攘之防疾病死葬之變不可孑然而獨處也故又慎擇其人之慈良信願號為師弟子結之以父子親戚之恩使可以相保相賴必如是庶幾其可也崑山東廣教寺為吳雄剎僧徒常二百人往往有以行業顯名當世者有曰𫝊法師者嘗出主杭之橫山寺明天台氏之說其行業尤著法師度弟子二人曰道彌道行彌獨得其師𫝊乃别築室於寺之東姚苓里名曰報恩精舍皇元至元間有司籍僧因升為院至大德中屋為颶風所摺乃以田易廣孝寺東偏隙地而遷焉傳至允穹正因又能增益其業視昔有加矣因公性機警又嘗問學材幹足以立事常居廣孝耆舊興舉墜廢其功居多非惟能紹先業而已又慮其徒或忘前人創立之艱徴豫記之今人有父子昆弟之屬家之所以成者由天倫之和而取賊敗者背是也况乎結至疏將為至戚其可以易道哉若然則庶乎始終相保相賴而無慮矣大寶洲記靜專者道之基亷退者福之原節儉者事之本古之賢知之士行高當世不危其身不損其名百世之下有喜稱而樂誦之者豈有他道哉世之末能下技譸張巧變將持之以欺世而盜名其自視為有餘貪墨而不止及其窮也亦可悲已故惟逰乎方外者其志堅定凡天下之可尊可貴可驚可喜不入於心故常超然而自遂焉蒙泉禪師則其人也師自齠齔歸於佛長逰四方從鴻師先生盡得其說至詩書百家言亦無不通元統間教府選材僧而得住崑山報本寺未幾遂棄不居由是檀越尊姓衣冠上流至於賈工下俚之人嚮戀彌至凡所施與無所吝惜師勇於進修而服食寡薄雖古之枯槁巖穴者無以過之乃視其所贏即寺之隂别為屋若干楹邑人章景仁讀書好義與師相善又能以力相之屋成象佛於中且以待四方賢者之來也署之曰大寶洲乃謂東曰子儒氏而通於詞願有以記之夫物希有而難致者謂之寶珠玉吾知其為貴土凷瓦礫吾知其為賤小子之智奴𨽻之明也天地之間有至寶焉智者得之愚者失之矣是故寶得其寶者祥寶失其寶者殃曰慈儉不敢為天下先老氏之寶也曰佛與法佛氏之寶也合佛與法而一之者僧也故僧亦寶也夫是寶也衆生非無佛非獨有衆生非缺佛非有餘故佛常欲與衆生公共而均有焉居之而弗施者謂之徒寶失之而不求者謂之棄寶吁佛亦悲之矣今夫是洲之大衆寶聚焉能入其中者行止坐卧常不離寶豈終有不獲者耶而為頌曰其洲大無量中有衆寶聚非金銀琉璃珠玉諸珍等其寶悉見前罕有能見者如盲眼無視如坐暗室中人辨五種色疑惑不能知惟無障礙故而能見斯寶充滿於大洲無有非寶所若有諸善人因以求寶至皆生大歡喜悉能滿其心昆陽鄭東造濮陽吳睿書并篆額瑞雲精舍記崑山東陸瑶里曰瑞雲精舍者宋咸淳間茜涇廣孝寺易公所作也里有陸氏為里中著姓易公陸出也精舍之作以近族也按廣孝寺碑寺始建於唐咸通中唐末寺燬至宋太平興國中有高僧子瓊道清者從汳梁來至海上樂其地古且得石幢草礫中識其為故寺址也乃重作寺以居四方之來從者蓋易公之初祖也故今廣孝眂易公之徒猶宗子也其先師弟子之傳以次至易公始度弟子二人其一曰法明為明之後者曰可才乃出分而至瑞雲焉凡彼此衣鉢之儲土田之入由是始判然而為二矣宋末精舍災皇元大德間明才二公復作之視昔有加焉既又作室寺之東序之北欲後人知其所自出也由才而下曰分祥清潤净元希孟從邑如以德鄰智融若谷義深善權其傳皆以次文山孟公慮其世逺而法壞且忘前人之勤也是不可以無記謁文於豫嗟夫世之享富貴有不能終其身或僅一再傳其子孫則已寒餓而亡滅者矣今佛真相傳或厯三四百年而不墜者無他道也世人急富貴捐禮義故子孫常多愚而易敗佛氏往往能慎後而擇賢宜其能久也豫觀諸瑞雲若孟公鄰公皆出世而師表於天台氏矣是不謂之能擇賢耶今又以賢而擇賢則其徒宜益有賢者矣其將相維於無窮哉昆陽鄭東造并書𢎞農楊希賢篆額無倪舟記客有夸其言於衆曰負一鍾之粟則用駝之力一半馬之力五人之力十矣今海上之舟潔其大則踰千弓計其力之任則踰千鍾用之入巨海走汪洋一日趠幾千里而不謂之勞人駝牛馬強日及百里弱半之汗出而力盡矣然則其為器大為功多莫若舟也客有在旁嘻然笑之曰陋哉子之見也吾語子以大舟乎仰而制圓俯而制方昆崘坱圠莫極端倪日月星辰之行也山嶽河海之流峙也九州生聚之耕作飲食也羽之飛毛之走鱗介之潜伏也蠢焉而昆蟲也植焉而草與木也廓以居之力以持之是故愈久也而不憂其壞愈多也而不憂其隘其為器也孰與其大其為功也孰與其多客又有在旁啞然而笑曰子之言幾矣吾復語子以大舟乎其制也方寸及其廣也包乎太虛無有端倪彼仰而制圓俯而制方納之吾舟之內有餘容矣日月星辰使不失其行山嶽河海使不失其流峙九州生聚使不失其耕作飲食羽毛鱗介昆蟲草木使不失其飛走潜伏蠢植且百世之上吾溯其流而知其已往百世之下吾從其流而知其方來然則其為器也孰與其大為功也孰與其多二客憮然久之曰吾知舟之為舟而不知天地之為舟吾知天地之為舟而不知大於天地之為舟幸聞先生之言可以去吾蔽矣句吳白雲師署其居室曰無倪舟昆陽鄭東為述三客者之辨作無倪舟記崑山州知州史侯生祠記佛氏以慈悲𢎞願汲汲拯救羣物為務而不私恤其身其設心竭慮亦仁且厚矣自其法入中國上而萬乘之君下而公卿大夫至於庶人莫不愛護而尊信其說故能垂之千百年而勿墜也崑山茜涇廣孝寺建始於唐咸通間其僧員之盛比桉而連業同堂而合食者常二百餘人蓋吳郡之東名藍古剎也寺舊有田若干畝遇嵗不豐食廪輒告匱境上富人因捐田入寺日餉得以少裕焉至正七年朝廷以凡天下寺其買田非宋金時者令徭役與齊民等且崑山為州徭役甚重以繁為東南州縣之最雖多田巨資之家一或失計即糜爛破壞不可復支况僧素不習事孱弱畏怯而一旦加之重務有司又低昻失平絲粟之賦刻期逼迫故往往鬻田送官用脫刑責且小吏賤卒假威上人日持牒踵門足跡相接苟弗滿意欲即造語生事巧發上怒動輒禍人至必待之如尊賔貴客雖一日數十人不敢忤一人焉由是寺力日就澌盡如病羸人僅僅骨立時廣孝之衆相顧無䇿壯者將散之四方老者立待於斃而已至正九年春朱方史公元來守崑公亷正敏亮恕惠愛人不立威任刑常近民而求其所惡欲閔閔焉若慈母得赤子於其懷也乃知僧之病役而廣孝獨甚焉惻然而愛護之甚至寺僧乃喜而相慶曰吾可免於散亡立斃之憂矣然公之恩我若是其厚吾無以報公是心缺然矣宜肖象以祠公不惟使近佛而求畀以盛大之福且朝夕若親公顔面而敬且愛焉則亦庶幾可盡吾心乎乃相東序治室而慎祠焉寺之主僧乘謂東曰凡人之情於事久則怠怠則忘之矣願為文刻之貞石將使吾徒懷公於無窮哉古之善為治者能勿咈夫人之情則其政無不獲者矣故上者常任德下者常任刑刑怨之淵也德恩之藪也前乎公為崑山不知其幾人矣未聞有能祠之者由今觀之刑德之應亦大相逺矣然則後乎公者又能以公之德人者德之其有不以祠公者祠之乎公有惠愛於人甚至崑山之民攟托其治跡之實而載之石甚詳也兹故略焉昆陽鄭東造并書𢎞農楊希賢篆直沽龍祠記通州南五百里其地曰直沽有龍祠龍能著靈凡水行之人涉危蹈險莫不賴龍以為命者且國家嵗漕東南之米三百萬石由海抵直沽而達京師於時海波晏伏雨風和平萬艘連連卒以無事亦莫不賴龍以為安者則龍之於民亦有功哉記謂能禦大菑捍大患則祀之龍之有祀也固宜又曰山林川谷能出雲為風雨見怪物皆曰神龍實有焉則其有祠也又宜吳之崑山商者沈某海行而至直沽數數焉其出入海水船安楫牢未嘗有倉卒怖愕之變故其事神益䖍因覩祠宇撓壞像設露處過者狎焉其心勿寧且曰神之德我人甚厚當其身危勢蹙呌號於神求哀而乞須臾之命將終身思報德不敢背負及其既寧而遽忘之我等小人真少恩哉乃度祠屋舊制歸擇材為屋凡若干楹既具越明年春舟載而植焉實至正五年也若某可謂能報神矣夫德人而責報於人者非也䝉人德而忘報人者亦非也今神不責報而人不忘報亦各盡其道而已且某亦商耳推是心而為臣將不後其君為子將不遺其親為弟子將不倍其師世之稱君子䝉人厚德其人一旦在患難則計較得喪不肯相顧者皆是也平居則曰彼商也今其見義反弗及之矣豫故書之非惟使過客常負於神者讀豫文內愧而汗下也昆陽鄭東造海曙樓記崑山之東北海上其地曰茜􅀈土壤衍平廣袤有美田深澤之利民居聮絡比密如縣邑然吾友楊錬師居之豫嘗往來錬師必久之而後去然獨恨其無高山大陵可以遊觀以宣暢湮欎之氣雖日坐屋下安飲且食使人悵然不樂欲去求車蓋諸山以望句吳之墟太湖三江之水則百里外不能一日而往還也自豫歸永嘉日有山水之樂然寂寞無人則思其冠服修好姿骨竒岸有如錬師者與之相從其間而不可得則又有不樂者焉且聞錬師治樓甚雄峻𢎞麗如仙者之居豫憶錬師當秋清暑退海月夕出馮軒而望思故人如余者散在四方與之嘯咏其上而不可得亦將有不樂也今年春二月豫來吳即過錬師求樓登焉而我二人相顧一笑向所謂數者之不樂皆釋然矣仰觀其楣間之榜曰海曙錬師曰子試為吾記之夫海之曙吾嘗習見焉夜過半日將出扶桑之旁隂氣消斂陽光四達於是時起觀清明之氣而吾之在躬者益有驗焉况其居髙臨虛而先得之者耶吾將從錬師於是樓之上又聞方外之士服朝霞而能久視必有以私授我矣錬師名希賢字敬仁善為歌章好鼓琴當世賢者樂與之遊云今年實至正十一年月日昆陽鄭東造并書聽海軒記水之為物也側出而上溢勇決而峻下抵崖而阻石而聲生焉然其聲也始而怒中而平及終匯而為海也納乎至巨蓄乎至深雖欲求其聲不可得矣是知水無聲水而有聲水不足於水也豈惟水哉至於人亦然今夫么麼之人有一善焉而其色也矜有一能焉而其言也夸夫是二者生於不足也尋丈之瀑尺寸之湍也聖人仁義之懿道德之豐藝能之通且習方退然而居天下莫能盡窺焉是故善觀水者必於海善觀人者必於聖人得其術矣句吳俞復初為老子之言且博通羣典以求合於吾儒氏之㫖君婁江去海且近因名其軒曰聽海或人以問豫曰海無聲奚用於聽豫曰甚矣子之固也夫聽海者非以聲求海也將求海於無聲也求海於無聲則海之為海也至足矣猶求聖人於無迹也求聖人於無迹則聖人之為聖人至矣以聲而求海將以已之量而淺海也雖然吾嘗居海而觀海之變當隂氣之將泄其聲卒然而生閧然而合茫然而莫知其所來頃焉大風應之與之相遇滉漭之中當是時豫起而聽之聲塞天地將不能容犬下之聲未有大於海也及其卒然而平泯然而止茫然而莫知其所涯是知無聲者為至足之藏有聲者為至足之發吁至哉海也故惟聖人與海凖也且天下之耳同乎聽有精粗焉夫習於海而莫之察者衆人也其聽粗也其智弗及也吁海哉海哉天下之善用其聽者日寡矣復初喜且請曰願有以記之遂為記花雨軒記婁山曰玉峯峯之南隱君子居焉竹樹蒙翳町畦交午中為軒兩楹北塞而南通春冬清燠秋夏凉肅適體悅性居處宜矣君老謝事子姓長日坐軒奧楞嚴法華諸典次第龕閲旦日起沃盥琅然誦讀雖甚劇勿間以為常如是已十載餘鄉人稱之曰善士邑大夫禮之曰信士士君子敬之曰貞士非善無以懲惡非信無以動物非貞無以處已君信其鄉先生哉豫友盧先生志道友於君有年教其子孫知孝悌忠信皆循循雅飭長子復初克承君志所交多名士寓公甫弱冠先生長者樂與之言嘗介盧先生求豫文發君隱德豫聞釋氏書善誘人豫於釋氏非能知知君好之以獲休譽於鄉大夫士若之有得也必祕祕必神神必顯其講說處天能雨花坐中君講說是軒能然否耶他日造軒中必有能然者感君至哉始名曰花雨嵗庚戌二月草五日齊郡張紳記又世有慕空寂以樂天賦之善而不越乎綱常倫理君子固當進之而不可概以遊方之外者竝論也崑山王祐之甫避世藏密朝夕翻誦內典以示無事乎奔趨無效乎刻畫淡焉泊焉內養外持雖藤葛紛㳫萬變日至吾則凝焉寂焉而已雲門山人張公士行過其軒居署曰花雨且為文以表揚之而又介陸公載請豫發其未發之㫖豫聞金仙之教其高深𤣥逺不可窺測故雖天地日月皆有成毁而其妙有實理則固未嘗毁也若其天雨寶花彌滿周匝於三千大千恆河沙數世界以顯神藏用豈特泥夫一室而已矣花之不根不柢不凋不謝無分乎春冬無間乎紅白又豈假乎造化滋培之力也耶祐之苟能有見則雖處幻境而不為幻境所惑不徒翻誦而已乎金仙之道貴在直超無始洞悟本真所謂不與生俱存不與死俱已者在是而不在彼花雨强名不過神幻恍惚以驚駭耳目豈可塊坐執著而流觀哉豫嘉其請遂因其命之意仍為偈云其花非凡花漫空眩衆目花花類生成凌亂從天雨無根亦無柢香嫓芬陀香匪但闍崛城遍覆恆河界若人能了悟眼目鼻觀間觸類歘有得重啓光明藏結習悉掃除飛墮不著體𤣥言既超出弗泥還弗迷燕坐動豪髮當作如是觀洪武四年龍集辛亥夏五月端陽日樵海老人淮海秦約造名蹟録卷二
