body:
  text: 名蹟録卷四明朱珪編墓志銘楊履齋先生墓志銘先生諱天澤字履齋號守愚子其先汲人始祖扈宋髙宗南渡遂居吳之嘉定楊巷里里始未嘗有名其族人蕃大人以名焉世為儒間有出仕至牧伯者至先生以文行聞於人其里姓益著曽祖諱椿年祖諱文炳皆𨼆德勿見父諱貴龍入老氏法中為道士性純孝父嘗疾病禱于上下勤至請以身代因而有瘳人以田來賣惻然語之曰汝獨無父母妻子耶田賣何活乃發廩賑之其人田卒不賣至今為富人妣盛氏正以從夫義以慈子人謂先生賢自父母賢也先生寛𢎞爽易不肯發人過人有小善稱之不置口又甚好客每客至則樂客多愈樂不至則不樂也客賢無逺近識不識雖躡屩踵門過之一以禮貌弗為等級有不賢雖僕馬甚盛未嘗一見焉故客在先生之門必賢也嘗闢廣堂置鉅樓可帀坐數十人日就與客會飲食客食必肉妻子則蔬也察客有寒色則解裘衣之故客在先生之門無寒飢也及卒之日客無貴賤聞之㑹哭于其家盡哀而去人往往歎曰惜哉使先生有位其待士如此有不為之用耶有不樹功業垂休光于萬世耶惜哉其鄉有告以衣食嫁娶死葬勿具疾病不能醫者先生咸賑恤之盡其鄉無有凍餒夭閼露暴及男女過時者甲致乙於訟先生陰為召甲賂之事既解乙勿知也後造門謝先生辭之曰告者妄耳終不以德乙也客有携其子來其身寒露先生顧謂其幼子曰此兒可憐其幼子即解衣與之先生喜曰真吾子哉其賑人率此類讀老氏書喜其言遂入其法度地立老子像至羣書無不通悉以資為詩然為詩直以見志不為深刻且喜飲酒旦從人飲酒至暮未嘗亂或歲時擇勝地集賓客為樂曰人夀㑹有盡身毋自苦也至元丙子正月己酉以痰疾卒後十有三日庚申葬于所居北半里先人之兆配顧氏生女二人初以無子以徐氏子為後曰希祖次娶宋氏生男五人長曰希道娶徐氏次希賢即㓜時能解衣與人者也次希逺同希賢為道士次希真娶謝氏希傅娶嚴氏女一人孫十有二人東始踰冠時識先生先生將五十矣不以年倍余長而以為友今老矣銘先生之墓奚辭銘曰可為勿為維有命勿以名殊維考行无位與爵德則盛斥餘賑之斯亦政古聞捉髮且獨聖彼氓敖怠卒以病我誠恱士士乃應應維其賢翼以正名聲播流實則稱史雖弗登維論定丙子之歲日月令父尊子卑二穴並綿綿其垂罔終竟後之觀者視楊姓昆陽鄭東撰金粟道人顧君墓志銘金粟道人姓顧名德輝一名阿瑛字仲瑛世居吳譜傳野王裔未必然否也大父以上皆宋衣冠大父任皇元為衛輝懷孟路總管始居崐山之朱塘里父玉山處士𨼆德不仕在養予㓜喜讀書年十六幹父之蠱而遂廢學焉性結客常乘肥衣輕馳逐於少年之塲故達官時貴靡不交識然不墜于家聲三十而棄所習復讀舊書日與文人儒士為詩酒友又頗鑒古玩好年踰四十田業悉付子壻于舊第之西偏壘石為小山築草堂于其址左右亭館若干所傍植雜花木以梧竹相映帶總名之為玉山佳處詩有玉山倡和等集行于世不學干禄欲謝塵事投老于林泉而未能果先是浙東帥府以茂異辟為會稽儒學教諭趣官者至則趨而避之至正九年江浙省以海㝢不寕又辟貳崑山事辭不獲已乃以姪良佐氏任焉又五年水軍都府以布衣起佐治軍務受知董侯摶霄時侯以江浙參政除水軍副都萬户開府于婁上又一年都萬户納琳哈喇公復俾督守西關繼委審賑民飢公嘉予有方即舉知是州事朝廷使者銜宣見迫且欲入粟汎舟釣于吳淞江丙申歲兵入草堂奉母挈累寓吳興之商溪母䘮于斯會葬者以萬計是歲函骨歸瘞于綽墩故壠當時交相薦舉乃祝髮廬墓閱大藏經以報母恩復鑿土營夀藏于山之陽環植叢桂扁曰金粟自題春帖云三生已悟身如寄一死須教子便埋蓋人傳前身是慧聚寺比丘延福又夢中知向一世為黄冠師姚興孫者是也金粟道人由是而名道人娶王氏生男元臣宣授武畧將軍水軍寧海所正千户今陞水軍都府副都萬户未任生女妙福贅陸琦次子元禮今授正千户總鄉民守本土元貴習舉子業未冠某在㓜一人女二人皆庶孫男二人孫女四人予嘗慕趙岐了身後事趙加勅子刻石墓前皆生而達者吁當今兵革四起白骨成丘家無餘糧野有餓莩雖欲保首領以歿未知天定如何耳今年四十有九且有鵩鳥入室恐傾逝倉卒中則泯滅無聞且欲戒後之子孫以苧衣桐㡌椶鞋布襪纒裹入金粟塜中慎勿加飾金寶致為身累故先自志并為之銘曰大生之有歸猶會之有離譬彼朝露日出則晞予生也于生弗光予死也於予何傷願言兹宅永矣其藏大元至正戊戌五月廿九日顧阿瑛自製并書汝陽袁華篆額故王子厚墓志銘子厚諱世淳姓王氏蘇州崑山人大父珪父忠義母魏氏子厚生平孝友以親老試吏為州書佐遇事簡直遭時多故念吏不堪為夙夜感歎遂以洪武元年四月乙丑自沈婁江而死春秋四十有八娶金氏子男二人曰謙曰復女二人壻曰歸德曰全濟男女四人其父以五月丙申藏其骨于馬鞍山之東岡嗚呼悲夫銘曰嗟嗟子厚離世氛兮發憤捐生從靈均兮返骨山岡償夙願兮陵谷變遷尚永安兮范陽盧熊撰元故處士陳君墓志銘至正十三年癸巳歲五月十一日崑山處士陳仁甫卒明年七月某日葬于古塘北一里岡身之原先是其子允謙以永嘉黄凱狀來乞銘處士諱仁夀字仁甫初姓陸氏陳無子以處士為後陳始居馬鞍山之陽其地曰東城頭宋末因兵譜牒㪚亡其先世皆不可攷延祐間州遷婁江處士以州遷地氣消散乃以擇地新州北鹽鐵塘東居焉父諱亨有才諝沈晦不肯仕處士和易損抑圭銳刓盡未嘗使氣忤物或暴逆相加則談笑解之鄉里稱其長者且素儉制錙累銖積乃至饒給暑寒裘葛雖至敝裂不肯厭棄至于施予則无少留吝飲食適口即止不求甘肥室廬卑隘或勸其易以閎鉅處士曰苐免旁風上雨斯亦足矣苟或過侈將何以為子孫法耶然四時接親好待賓客為美酒嘉肴必極豐備見富人多田往往桀驁虐農而過倍取入至其子若孫有不能保者皆是也常戒諸子曰吾幸有薄田可給衣食苟取倍自益亦止自損耳今其諸子皆賢守遺訓也世夀六十有二配王氏生子四人曰允謙允讓允恭允敬允謙娶王氏生子三人長曰睿次智次孝孫女一人允讓娶岳氏生一子曰聰女三人允恭娶余氏生子一人曰聖安女三人允敬進義副尉平江等處水軍萬户都府百户佩銀符娶王氏生子三人曰明曰德安女一人處士獨以為善稱于鄉使其人之為不善者聞之亦可以少媿矣雖其享年不及獨其子孫衆盛若此將必有顯大其家者尚謂天道之不可信耶銘曰麟也有定獍也為羣黑由白分厲以􅍇分爰視其家亦既孔敦彼由掊厚我實用勤維彼昏人愚何可云謂天實髙弗予聽聞顧獨斯人厥𦙍如雲其報曷已川流沄沄閱千百祀永徴斯文章母墓志銘章母諱妙觀吳郡張氏之女也其家乘亡逸世系不可攷母生而了慧父母愛之過于丈夫子當行為選佳壻歸于崑山章處士天祐處士沈厚果毅才可用于世獨不肯仕初家未甚裕自母歸克相于内由是日以豐大處士欲為一善母必勸之果往往捐餘賑乏惠及疏戚甚衆故其鄉稱處士之善者必及章母焉母性慈厚至御下婢亦嘗貸以色雖甚忤意罵詈之聲不出口子使就學常戒其毋嬉笑今子麟讀書甚賢人稱處士善教亦必及於母今其鄉之為人婦與母者取章母為法焉至正十三年歲癸巳八月六日己丑以疾卒明年四月十有七日己酉葬于州西惡安鄉致和塘北先塋之左處士先母四年卒至是始同葬焉世夀七十有七生子一人即麟是也娶張氏名淑貞庶女一人曰德慧適同州朱德賢孫三嫡長曰禧次庶聖保佛住麟嘗從永嘉鄭東遊拜且泣曰麟葬母有日願先生有以銘銘曰爰有家家孔贏相夫子宏厥聲訓子麟竟有成用刻銘詒于後昭兹往式視章母故處士夷孝先生盧君墓志銘先生諱觀字彥建其先龍興武寧人五世祖來平江遂占籍吳縣曽祖諱仁仲字和父祖諱銘字明叔工詞賦鄉舉待補進士考諱有常字元吉以𨼆約終妣吕氏先生少刻志于學嘗受業于鄉先生湯公彌昌錢公重鼎之門既卒業客遊江淮間名卿鉅人有欲舉先生出仕者力辭之𨼆居教授接人勿以貴賤異或加以非禮先生恬然不與校曲直遇人䘮葬患難雖力不能贍亦必為之盡心經畫其事親温凊滫瀡不以貧故或少闕暮年抱贏疾猶手不釋卷吟哦諷誦咀嚌道真益勉飭其子孫以讀書修行會母卒先生不能行䘮禮痛慕悲號病日増劇遂以至正二十二年冬十月庚辰卒得年六十五歲娶同郡王氏子男二人曰熊曰熙女照適清河傅􅆽孫男二人彭祖充􅜶孫女一人曰織熊痛惟先生生不能力學以厚養歿不能顯光幽潛請于門人弟子私諡曰夷孝先生即先生歿後之十有八日葬于長洲縣武丘鄉先塋之左其友人陳留申屠衡為之銘其詞曰是為夷孝先生之宅依其先壠之側惟詩書世澤亘百世而弗忒者噫彭城錢逵篆葢元故遷善先生郭君墓志銘先生諱翼字羲仲世崑山右族考友諒為大賈獨善教子妣陸氏先生自少入鄉校從衞培學培故宋參政涇諸孫博學篤行亟稱先生穎悟深加器重先生既壯益肆力于學沈潛百家尤䆳于易年四十閉門授徒嘗署其受業之室曰遷善曰以識吾過也鄉人亦為名校南之梁曰遷善曰是吾郭君之所居也先生為文詞必追古作者諷誦思繹雖一字不苟省也其于一時文人少所許予獨稱永嘉李君孝光及天台丁公復所為詩李公亦謂先生之詩佳處與人不同調會稽楊公維禎每以其言為韙先生與俗寡合有力者多不肯薦引竟以訓導老于學官由是家益窮守益堅攻苦食淡讀書自若也嘗自號東郭生又自稱曰野翁所著文集曰林外野言凡若干卷病且革知州髙昌偰侯率州人士治其葬事以至正二十四年七月廿三日卒年六十以是月某日窆于馬鞍山北之中峯因題曰遷善先生郭君之墓妻胡氏長子夔皆先卒次子疇女壻汪思齊陸彛孫男長夀嗚呼先生之生也連蹇不諧于時其歿也貧无以為葬亦可哀已先生嘗謂熊曰吾死汝為銘銘曰嗚呼有為而不遂于施而卒至于斯吁其可悲吁其可悲范陽盧熊撰并書吳部王時篆蓋元故靖夷先生顧君墓志銘先生姓顧氏諱權字伯衡世居徽之婺源其父達卿始入吳因占籍崑山娶婦生子為崑山人初達卿與雲峯胡先生同里閈心敬慕之期有子當使為士及先生既生見其凝重岐嶷益自喜銳意教督之先生稍長能觀父之志敏力學業不以祁寒盛暑有少輟既壯博習羣書尤究心于易教授里中子弟多從之遊時人莫不善其父之能教也先生為人不事矜飾喜哦詩飲酒常頽然自放然其交際恭遜久益謹葢未始忤也中歲刻意為文章有古作者矩度雖一字小疵不為苟且其志亦欲以是少見于世者遭時䘮亂竟窮无所就以死年不滿五十無子昆弟族人為主後嗚呼天乎先生乃命之如此悲夫先生娶吕氏生子輙夭死買妾得一女尚幼其卒以至正廿四年九月丁亥其葬以十一月丙寅其墓在馬鞍山之北􅅢其葬事知州偰侯斯教授蔡君基之所具也葬有期日其故舊門人咸痛其有德无後相與私諡之曰靖夷先生而奎與為銘也銘曰善不必有後仁不必有夀彼夢夢兮誰則能究言甚文兮行甚懋嗚呼先生為我能為兮苟在我其奚咎故朱徴士墓志銘徴士諱玉字君璧姓朱氏先世自江西來吳今為崑山人祖已上譜逸考諱𤣥妣秦氏徴士幼頴異生十二年遭外艱能厲志樹立既長喜繪事聞佳山水每翛然獨往數十里不以為難永嘉王振鵬在仁皇朝以畍畫稱㫖拜官顯榮徵士從之遊盡其伎王君亟稱許之至順庚午中奉中宫教金圖藏經佛像引首以進方不盈矩備極其狀而意度横生不束于繩墨人言王君葢不之過云至正十有五年清寧殿成敇畫史圖其壁吳興趙雍以徴士輩二人聞使使召之家道阻弗果上徴士亦既老矣偃蹇一室以圖史自娯楊維禎先生所為記虹月樓也徴士行内修平居言貌循循薄于利欲身且老猶精謹如壯者廿五年十一月十一日卒春秋七十有三娶諸氏又娶支氏子男二人長曰佑賢其㓜務德蚤亡女一人適許氏孫男三曰翬翯翇孫女一曽孫男一曰寧孫女一明年月日葬其州卜山之西原予聞界畫家王士元郭忠恕為首冠偭偝髙下一守矩度而王君吮筆為之曲折層叠自如度越古人矣徴士得其傳是可銘也銘曰名藝之成太平之澤貽爾子孫尚引勿替華亭殷奎撰武寧盧熊書故處士傅君墓志銘處士諱翼字仲翔平江崑山人父榮母王氏處士少孤苦既壯業吏事猶不免貧窶其為生甚艱然其志不以是而亟貨利也有一子則使為儒者其所以教飭之甚力曰士而貧何有于皁之富也今其子學成遂為儒家處士素直義見人善為之喜躍如在已見為非者衆督過之而不為背憎貸人財度不能償即毁劵弗少吝遇親友飭詞矯貌簡如也春秋六十有一至正廿六年丙午歲十月八日卒娶周氏再娶劉氏張氏皆先卒子男料長女嫁沈源次女嫁陸厚皆周出也孫男杠梠孫女杼軸以其月十五日葬其柩馬鞍山陰之中峯處士嘗手冩孔孟四袠遺令内壙中銘曰艱于生勿徇世以失渝其子以學去吏而儒今既償其志又將焉求華亭殷奎撰武寧盧熊書并篆蓋盧府君妻王夫人墓志銘夫人諱蕙字靚之平江崑山人祖諱國器父諱慶詢母范氏慶詢子女五人而夫人最長得早承家教誦詩識字縫紉烹飪皆精善年廿三為同郡盧府君諱觀之妻禮頌端肅不妄言笑不輕出屏幃甚為姑嫜所重府君孝友能貧夫人相之維謹其訓子女弗加笞責而悉能有成待妾御未嘗訶叱鄉閭稱頌為楷法府君老且病夫人經年不解帶府君歿後其子熊以禄仕迎養郡中既而平江被兵夫人居圍城中憂悸成疾嬰城之日熊被創甚例遣上道幼子熙自崑山來奉夫人歸里㑹關法不出婦人仍主於滕君德進滕婦方視夫人如尊嫂親為調䕶吳元年冬十月夫人疾革日在辛酉遂卒年六十三貧無以為斂滕君復命諸子經紀其事親故亦多往賻者熙始得葬夫人柩于長洲縣武丘鄉去閶門五里初府君之𦵏熊為夫人豫作夀藏兵後他家悉發而府君墓獨無恙至是竟合祔焉豈先德之厚陰有以相之抑夫人平昔為善之報固如是耶熊博學有才諝熙亦好修篤行女照嫁士人傅􅆽孫男三人孫女二人熊既乞銘于曹氏以奎嘗教授府君有契家之誼復俾為序云其銘曰有子而仕繫親之喜曷養之弗終覆養以死孰衛其藏弗毁于兵今祔于此尚慰而子華亭殷奎製序譙郡曹亯銘豐城余詮書彭城錢逵篆額孫君墓志銘君諱元吉字吉卿姓孫氏其族本出富春平江崑山人譜牒㪚落不可考次祖諱凱父諱淵妣賀氏君少為吏雅有幹局持心平恕不肯屈法市恩至于排難解紛誼所當為即奮然不顧利害年四十便棄去歲計田租所入祭祀衣食之餘日置酒以待賓客遇賢者至即聽其講論文義令子孫列侍覬其進益間有博奕絲竹之娯方術藝能之士招與欵洽亦不屑也晚年築室城南水上署曰瓢窩角巾野服逍遥林下人稱為瓢窩道人别號呐翁重罹變故憂憤形于顔色俯仰徬徨若無所容于世尋自刎死年六十有二洪武元年戊申歳正月晦日也配邵氏有子三人長曰文德次圭次基孫男五人某某缺文德等葬君於馬鞍山陰之原君于予為先輩君死時予覊客江寧聞問為之痛悼及還里中文德以狀乞銘其壙予既為志其詞曰霧霾濛澒兮風猋怒之太行嶮巘兮荆榛莽之待斯人之獨閔兮慘煩悁其誰語宵耿耿之不寐兮辰咄咄之無語冐温蠖吾弗能兮孰臭惡之能處與其偭以偷生兮茫茫絶吭而逝兮孰遺塵乎西山之餓傖已矣乎衆貪婪以苟活兮子獨抗志而莫奪憤世以陋俗兮殺身以殉潔以死為樂兮謂生可厭豈所欲之有在兮孰云蒙懂而非達嗚呼哀哉作善離㓙兮不究于年是曰遭命兮非子之愆縱細人之倖兮吾子之安重泉有知兮慰以斯文吁嗟千載兮視此石存故劉府君妻盧氏墓志銘吳郡盧熊祖妣吕氏之卒葬于崑山縣西北馬鞍山後初熊之姑名柔正者實彭城劉府君諱珍之妻也府君有子輙夭年望五十而歿兩女皆已嫁為士人妻姑年始四十復撫其孤女三人依熊之父居焉其後熊父為擇周英徐𤣥為壻英養于家英妻卒復以季女歸之姑歲時往來哭熊祖妣焉哭熊之父焉哭熊之母焉而姑亦老矣洪武建元戊申熊自江寧奔母䘮還未期而姑遂卒焉嗚呼其可悲也矣劉府君𦵏吳縣髙景山今既不克祔葬遂奉其柩葬于吕氏墓次今年庚戌始勒石為志而俾熊書之熊之曽祖鑑宋平江府待補進士祖有常𨼆居不仕其先龍興武寧人也銘曰盧女劉婦字㓜禎家世儒者耀厥聲弦琴誦詩壼範成相夫祀事致潔清孝慈婉順播德馨嫠居廿載難成生撫育外孫惠均平世夀六十有四齡屠維作噩屆朱明下從慈母歸㝠㝠中峯之藏維永寧故俞府君墓志銘崑山俞府君以洪武三年缺月十有七日卒年七十其月二十五日葬于縣城南積善鄉先塋之次其諸孤致詞友人盧熊曰先君葬有日敢請銘按狀君諱謙字謙甫早有志操既長能樹立習法律為吏性剛直臨事奮身不顧利害人有善取為已師不善疾之如仇面折人過失不少貸其奉親事兄一以孝敬濟窮恤孤意亦周至衆由此稱之年望五十即退休于家曰吾衣食粗給苟伏臘之計不遺以恱吾親斯人子之志矣矧敢妄求耶遂卜室南闉外屛絶人事以產業畀諸子人益賢之會有誣君㓜子嘗𨽻軍籍牽連者十餘人悉送兵部君亟走訴中書咸得釋以歸未幾君又以事至京師遽病寒急返比至家三日而歿君之先葢杭之臨安人父洪為平江路驛史始家崑山今為崑山人君娶陳氏子四人思敬思聰思義思誠孫男二人鑑鏞女四人初君未有子熊先祖𤣥吉父謂之曰君孝慈方直立心不欺天將畀之多男子矣今諸子皆賢孫息蕃茂天之報施善人豈不信夫銘曰志皦皦兮烈秋霜譽洋洋兮著鄉邦有子孫兮而熾昌猗作善兮有餘慶尚不朽兮視銘章范陽盧熊撰周府君墓志府君諱允升字吉卿姓周氏其先常州晉陵人七世祖世德宋南渡時始遷平江之崑山居焉曽祖天驥娶盛氏祖津娶袁氏治詞賦端平元年嘉熙四年鄉試兩舉待補進士性介直好施與貧者資以粥藥棺槥作輿梁浚井渠悉無所吝嘗刲股救父疾或以義責之曰父母遺體豈宜毁傷然因所予者還以奉之詎為過耶竟以髙夀終父大任元建德路夀昌縣儒學教諭自號好山居士居士先娶葉氏生男二女一再娶陳氏生府君及三男一女府君家世為儒而以醫術名於鄉邑能謹飭勤儉不妄交遊兢兢守業不墜以疾卒於洪武三年七月十七日年六十三子一人曰英女為孫元亨妻先卒孫男二人女二周氏世有墓祠曰奉思菴在縣西大虞浦上剏于宋紹興中至是府君亦祔焉府君之妻王氏余從母也故為志云范陽盧熊造并書故閑邪居士楊君墓志銘君諱誠字敬方姓楊氏其先中州人父諱榮自揚州來東吳與民數于崑山母馬氏以延祐三年八月十日生君君生裁數歲䘮父嶷然能自挺拔不與常兒羣甫弱冠以養親為州書佐為人狷介寡合不肯伍餘子下視之既而曰吏果不堪為也輙棄去築室婁城之南躬事田業為𨼆居計聚經史羣書種竹灌蔬將老焉而州縣知君方敦迫君為曹吏俾治田賦既集事即謝歸里舍一旦逮君京獄竟以洪武四年六月廿六日死于應天府江寧縣治年五十六其子綸權厝君于聚寶門外之笪家山其年冬十有二月甲辰歸藏崑山惠安鄉曲水之西君娶鄒氏又娶陸氏子男三人長曰經次曰綸約女四人長適周素次錢杶次錢宲次許嫁毛程君居家整飭肅然有嚴君榘度君讀書惟獵取大義不事汎求晚年尤好二程朱子書手之不忍釋以及軒岐孫吳學皆能造其閫域自號閑邪居士既葬經謁奎為銘奎聞居士死哀其為善而得禍言之未始不泣下今其請又奚忍辭故為之序范陽盧熊銘之詞曰於乎楊君才猷之楙兮胡迫于州縣亮直之槩兮胡困於罪譴匪我求兮期自衍嗟何尤兮罹此變於乎楊君知命之達兮抑又何怨長平殷奎著文范陽盧熊書齊郡張紳篆葢周伯延墓志銘故周君諱英字伯延之墓在太虞浦東若干步伯延之先由常州晉陵徙平江之崑山曽祖津來端平缺試詞賦兩為待補進士能以孝義聞于鄉祖大任元建德路夀昌儒學教諭父允升謹恪守先業二世以醫名家而伯延之學益閎博深奥人多敬慕之洪武六年癸丑以醫局事繫府院夏六月初三日竟以疾卒明年甲寅春二月祔焉伯延之生以元至順元年庚午九月二十日得年四十有四兩娶劉氏各有一男一女男曰冕曰安定女曰某曰某其葬也冕衰絰拜哭以祖母王之命俾其内弟盧熊為銘詞曰猗若人業孔茂行修飭資篤厚困獄吏非其咎竟不禄命所取捐孩兒哭慈母月丁卯日癸丑大墓旁葬北首潛德存昌厥後述銘文庶不朽故張公墓志銘張為吳望族居崑山者由唐禮部尚書後𦙍顯其孫鑑相崇陵並載列傳宋末暨元蕭墅之張益蕃衍公諱伯英字伯雄一諱伯庸世居蕭墅曽祖考諱某元初率民歸附即軍前授把總祖考諱振祖𨼆德弗耀父名傑前水軍府千户妣吳氏公美風姿有器識慷慨尚節義宗姻鄉黨有空乏者周之閭閈冇罹非辜者直之有䘮不舉及流寓不能歸者賻之贐之由是里中翕然稱為長者然不樂仕進至正丙申薦離多故遯迹田里務農積榖以盡俯事仰育之道乃延師教子相與講明經史又能以人生年月日時枝幹生冲推測休咎嘗謂其宗人曰歲在癸丑吾其殆乎果以洪武六年六月二十有三日以疾卒于應天府之上元縣孤子倫函骨以歸八年乙卯九月四日辛酉葬于崑山縣㳌川鄉蕭墅西原先塋之左公生於天厯己巳正月三日配蔣氏克勤于内公賴焉子四長曰僖娶羅氏次即倫定婚于吳曰偉曰侣女一人淑貞皆㓜公始弱冠即以幹蠱聞田廬有加于昔建倉鳳陽府一出私帑務以周人利物為心宜膺夀考噫天之不可必者而遽止于斯也悲夫遂系之以銘銘曰德積厚惠施博厥報乃食若播之不獲卒殞于客不殞者存再世而振祚𦙍繩繩袁華撰并書篆額楊子經墓志銘崑山楊氏之子曰經字子經少從予授小學讀書頴銳異于常兒其父自號閑邪居士剛嚴可憚家庭之間進退有度一言一動不敢苟且率略鄉里皆期其有成年二十餘便罹家艱能與其弟持門户有司推擇為方石長以督責兩稅竟以罪死京師年二十有五實洪武七年八月某日也及其䘮還弟綸歸葬于先塋之側嗚呼哀哉楊氏裔出𢎞農子經之先居揚州江都祖榮始為崑山人父諱誠尚氣豪邁即居士也子經以至正十年庚寅六月廿四日生洪武十年丁巳三月某日葬適母鄒氏生母陸氏妻繆氏女一人曰珤娘嗚呼予托交居士數十年其出處進退不蹈于流俗而父子相繼以死豈厄于世運而致然歟將禀命修短一繋于天歟葢不可得而知也因系之以銘其詞曰幼學壯行志不獲騁風霜激烈摧彼朝槿歸來故鄉靈或未冺勒銘幽泉有涕斯殞范陽盧熊譔錢瑞妻章氏墓志銘處士錢伯祥甫之妻章氏德禎祖諱敬又諱俊母胡氏德禎生延祐五年戊午四月二日年十有六歸于錢氏崑山在宋多故家衣纓文獻為諸邑冠若開封之鄭濮陽之張陳留之阮髙平之郁皆是也錢本出郁氏房族甚繁德禎既廟見能以禮自防舅姑妯娌宗族鄉鄰咸稱其賢惠奉祭祀饋賓客必以身先之洪武七年甲寅七月二十日以疾卒年五十七有子輨清修好文孫男嚞女蕋以是年十二月十五日葬于縣治之西南郁氏先塋之東北詞曰猗錢嫂壼職修相宗事承世休婁之江崑之丘勒兹文識諸幽范陽盧熊撰名蹟録卷四
