body:
  text: 名蹟録卷一明朱珪編誥命崑山縣城隍之神誥奉天承運皇帝制曰帝王受天明命行政教於天下必有生聖之瑞受命之符此天示不言之妙而人見聞所及者也神司淑慝為天降祥亦必受天之命所謂明有禮樂幽有鬼神天理人心其致一也朕君四方雖明智弗類代天理物之道實罄於衷思應天命此神所鑒而簡在帝心者君道之大惟典神天有其舉之承事惟謹崑山縣城隍聰明正直聖不可知固有超於高城深池之表者世之崇於神者則然神受於天者蓋不可量也兹以臨御之初與天下更始凡城隍之神皆新其命睠兹縣邑靈祇所司宜封曰鑒察司民城隍顯祐伯顯則威靈丕著祐則福澤溥施此固神之徳而亦天之命也司於我民鑒於邑政享兹典祀悠乆無疆者主者施行洪武二年正月日崑山縣城隍神廟在縣治西南三十步甲辰嵗仍故址復作之今上御厯之初嵗次戊申冬十又二月詔有司祀山川以城隍神配且錫神爵府以公州以侯縣以伯冕服之章咸有其度示更始也明年春三月己亥蘇州府照磨張濬奉敕書到縣知縣臣公瑾洎僚属郊迎惟謹焚黄祭告以拜寵命是夏六月不雨公瑾請於祠下與神約盡三日雨降及期而雨一縣霑足父老咸謂神之靈響素著至是益信兹擇乃吉日用刻制詞洪惟朝廷嘉惠於神馨香所格實自今始神其相我民社以永垂於無窮哉臣公瑾拜手謹書奉訓大夫蘇州府崑山縣知縣臣王公瑾承事郎蘇州府崑山縣丞臣董仲宣承事即蘇州府崑山縣丞臣張顯將仕郎蘇州府崑山縣主簿臣馬克成將仕郎蘇州府崑山縣主簿臣趙惟善蘇州府崑山縣典史臣苗利貞洪武二年八月日建碑銘資政大夫江浙等處行中書省右丞岳實珠公政績碑厯代無海漕海漕自國朝始嵗漕東南之粟三百餘萬石出崑山海行走直沽而達京師事重以大置漕府長佐賔属凡若干人俾專厥職必簡拔長材通習海事者又慮其曠官弛事皇帝嵗遣江浙行省重臣使紀綱焉至正四年右丞岳實珠公實奉上命恪䖍勿怠公方嚴亮直不事表襮嗜好寡薄儉以愛人至官廨見供帳庖膳甚備即令去之曰吾任國家重務朝夕祗畏慮有弗稱敢以私奉重傷民財吏士視效罔有需徴漕户力莫能葺漕具及官與值則窘期日多簡陋就事公即先數月與值且令府長長循為故事祀事天妃擇日齋祓宿於廟下躬視祭器牛馬充腯百禮備好牲酒既陳正冠以入進退興俯誠敬殫盡文武上下不譁不傲神嗜飲食告以利行萬艘畢發鼓鐃喧囂棹工踊躍謳吟滿海相風之旗端正北向百􅅘效職海水晏伏長鱷大鰌不見蹤跡則公愛人事神之誠感召至和不誣矣是宜刻之貞石用昭休績乃系之以詩曰王畿輸粟東南疆造舟道海行汪洋祥颷應候不可爽漕官飲食勿暇遑小大執事材盡長我公𨽻之孰不蘉給供百物循故常公獨不使民力傷父老歌咏於道旁永永㤙徳矢弗㤀我公齋潔祀孔明陳牲以肥酒芬香靈保歡喜神具饗寳珓告我日月良漕發之旦隂以暘海之百怪俱遁藏神來翼我靈火光大星奕奕流中檣開張風颿如鳥翔萬里之海三日杭民惟足食乂且康禮樂可作王度彰公歸執樞均萬方海陬千載遺歌章鄭東撰呉睿書奉議大夫崑山州知州王公去思碑先聖王之有天下也百官庶職悉用仁賢布列中外一有淫惡即屏除廢置以逺人害故當是時至治之澤流浹海内無匹夫匹婦之不獲者矣然古之為治也易今之為治也難封建未罷上下相安故得以詧民情而通風俗是以能相安也後世分郡縣置守令一旦以楚人而臨之越人之上民情莫能詧風俗莫能通且長與佐賢不肖共處吾將為善彼或沮焉彼將為不善吾莫能禦焉苟非其人之才且賢而有能過人者未見能善其治者也呉之崑山其地濱東南之海土沃而民衆賦重而事繁號為難治至治三年東平王公世傑實長是州公亷亮簡直惠以愛人始至亟視學宫社稷曰民無教則淫民無食則死學社教與食民之本也不可緩也乃作講堂以居講習更新壇壝以嚴祀事初民多入賈衒射利公諭力本闢田凡若干頃吏並縁為奸里正役常至不均民情困敝公即更之人無怨言法以四時役民為坊正管庫民且當次吏搖民壞次以取賂嵗凡數四民不得寧多流出境公歎曰民病有若是耶乃屬其民富貧使自實民不忍欺因得品次若干户釐為三等役以不易民喜而相慶曰我等可相保矣民因書其事於大帛羣歌市過之且持酒肴詣拜公為夀公親起與民為主飲民酒至一杯盡民同聲曰願公百嵗民之流徙而來歸者相接於道崇明為州逺在海上去崑山且數百里其民聞之願為崑山氓者凡若干餘户甲與乙争利乙手臂提甲甲以矢中乙繫獄二年公處得其情出之漕船入海遇賊賊駈漕夫四人過船以刄刼之使與同事後連捕繫獄公以脅從亦悉出之公以愚民詿誤牽連至行省州父兄子弟慮公因沮抑棄官至累數百人詣省門見丞相泣且言曰我公無罪願大人神明無以毫髮加我公由是感動即諭遣公還未幾公以母夫人卒去去之日民涕泣遮道馬不能前嗚呼若公之才且賢可謂能過人者矣其施諸民者厚而民報之亦至是烏可以偽為哉彼或失其道而曰民之無良是亦不明之甚者也使觀於此亦可以少媿矣銘曰皇仁如天以莫不覆亦無不載如地之厚顧瞻九州九州茫茫維億維兆不遐有傷孰協於治曰維守臣敷以仁義洽於齊民民曰父母止生我躬不有良牧孰御我窮昔公來止重食敬教凡百有作去惡從好我役孔艱集于予毒如病頭垢卒用櫛沐民罹于辟俛俟刀斧維心淑問縱之圜土民聞來歸如彼流泉連檣濟海於我受㕓民愚召咎匪公之愆控於方伯斯悟公賢帝方思治君子是使克燕我人恵于天子我聞公歸請公勿亟匪公則歸作輔天室崑陽鄭東譔崑山顧信書濮陽呉睿篆海道都漕運萬户府逹嚕噶齊托音公政績碑天下之事乆而趨於敝者勢也任其事而不知其敝非智也知其敝而莫之能易非勇也今夫主公義而不恤小故持已斷而不惑衆見非其人甚智且勇其才有逺過人者不能與也昔我世祖皇帝既定南服將轉其土所出之米内充京師上下有司百官六軍之食道里逺阻不可河漕陸挽也時則有朱張氏能用智慮身入海水尋其漕道由崑山出大海舟西北行旬日而抵直沽其亦利甚嵗漕米亡慮三百萬石當是時也漕法始立且二家殷富不有買賣盜食輙敢謾上自二家廢迄今四十五年漕户率衣食於是或其家粗富而其人畏刑漕萬則官之萬也漕千則官之千也一或窘貧則相率無賴買賣盜食無所不至矣朝廷以漕府吏其風采無以服人至正十二年冬托音公實奉命來居府長公亷直剛果慈惠愛人始至則張理綱紀修舉廢墜漕户彫靡者盡削其籍别召富民俾共漕事始人甚難之然人素服公威望重令下無一人敢後至者進民㕔事下從容諭之曰今官與汝直且汝視直所漕米多寡有差他役且一切汝復無苦也民聞公言罔敢違逆退相先治船以稱塞公命初法漕户有不肯躬身入海者坐之公以新户多富户民多軟弱弗習海苐無失事聴其用人自代且為常法時府庫空匱漕直錢莫知所出公慮後時害事憂見於色㑹都省遣使送鈔行省供億軍務公聞之馳馬至姑蘇驛從使臣留鈔使臣以軍務急重不從公曰我為轉饟顧不急且重也竟取鈔二十萬錠以給漕直漕户利焉故事嵗春夏宰臣暨漕府長祇奉皇帝命致祀海神天妃公䖍恭齊祓躬視牲酒肥充潔新一如法式比於行事進退興俯始終恪誠神相漕事濤風禁息卒以無虞漕户盜賣米而征民取償吏役並縁為奸公察知之苐令坐漕户毋縱氾濫螙民民免者甚衆呉民饑公視官廪多羨米謂郡長吏曰今四方盜賊蓋良民也迫於饑耳吾食厚禄奈何坐視民饑且死不少願恤也郡長吏即盡出羨米平價大縱民糴民甚徳之成周國有大事則六官通職以相助是謂官聮故有喪荒之聮事若公之救民饑非出位也且其居漕府更法易弊其智識實能以佐其勇是不謂之有逺過人之才者耶公嘗為御史出監閩憲復貳浙東帥閫皆大有聲今其政績又顯著若此作為銘詩刻之貞石以示無窮不亦宜乎銘曰於皇世祖既受天命奄有南服南服孔將有江有湖誕殖嘉榖有新附臣肇啟其海用海為陸乃漕其粮上入於京其食斯足凡彼作法維鮮克終罔不有淑彼衆漕人乃敢用奸勿畏于戮皇帝曰嘻謂公汝南作朕心腹公召我人曰來共事匪汝荼毒復汝徭役亦勿從海予大矜汝致䖍神妃沐浴齋慮遷宿祠下躬視潔肥壺濯鼎鼐羊豕牛馬大昕公入祼薦拜起億萬觀者神食馨香馨香惟誠匪樂巫舞神妃效靈漕發之旦無暴風雨蛟鼉遁匿水波偃平保有檣櫓呉民罹饑中心怛憂食勿暇遑民來貿貿俾控邦侯發陳於倉民無散流老稚飽嬉歌於道旁其歌維何曰維報功天子聖明亟召公歸公歸秉樞大惠羣方崑陽鄭東譔濮陽呉睿書崑山州重修東嶽廟碑有天下者得通祭山川之神葢中天地而立故其氣通諸侯非其境内則不得祭非惟不敢踰犯禮制然亦非其氣之所能通也嶽之列有五岱宗在秩祀為最隆故唐虞巡狩必先至其地成周之時其山在魯境内故惟魯得祭今其祠廟遍天下則天下皆得祭之非止於魯矣昔楚昭王有疾卜曰河為祟大夫請祭諸郊昭王曰三代命祀祭不踰望不糓雖不徳河非所獲罪也仲尼稱其為知大道然則山川非其境内不能為禍頋獨能為福耶雖然予嘗考夫後世徧祀之故曰山林川谷丘陵能出雲為雨見怪物皆曰神公羊氏傳曰觸石而出膚寸而合不崇朝而遍雨乎天下者惟泰山爾是泰山能出雲為雨且其雨及天下是有功於天下天下祀之豈以是歟宜他嶽不得與焉崑山有祠大徳初河南行省左丞朱公清所建也中殿後閣前門旁廡規制完具公乃延道士殷君震亨主之且使之甲乙以相承繼次𫝊金君修徳殷君元善楊君春澤迨今且六十年木之堅者日腐土之黏者日解丹雘之絢爛者日晦昧漫漶春澤乃謀於師曰祠廟之設實為兹邦之人雨晦疾厲相近之地兹屋日就於壞不修將何以嚴祭祀乃與其師盡出所儲即興工役邦人亦多輸錢以助未幾腐者以易解者以固而晦昧漫漶者以新時至正十二年壬辰嵗也初震亨又别作室於祠廟之東南曰靈寳進院今亦春澤主焉震亨字在山崇明西沙人徳業為時所推重宜其傳世皆賢也余惟能福天下者岱宗之神也能建祠廟使神福於一州者朱公也能繼其功而勿墜者殷與楊之力也是可書已又為之作為歌章使州人歌以事神其詞曰岱宗巖巖位東方大哉兖鎮魯所望其色上與天蒼蒼蒼龍七星經中央發育萬物司青陽夭厲不降降休祥大雲時出冐八荒氣闔為雨闢為𤾉黍稌濕燥丕穰穰民不饑餓逢屢康中非靈􅅘孰主張兹義明白非𣺌茫恭惟洪功浩莫量千古萬古天同長唐虞下暨明聖王代隆祀望彌昭彰秩踰四岳禮非常西南北中讓莫當扶桑出日灼殿堂木蘭斲橑文杏梁幼牲角握弱匪强黄流在卣臭馨香我卜而食時日良飈風倐忽神來享昭明在上何洋洋冕而青紘帝衣裳山祇川后序兩旁祝𫝊神指意孔臧天子萬嵗夀無疆敷錫四海名永慶崑陽鄭東譔濮陽呉睿書并篆額重修靈慈宫碑海之利天下其功用為最大通舟楫濟阻逺遷貨資之重雖地之相逺若秦越無乗車御馬之勞不踰旬日可坐而至矣然天下惟海為至險况夫操不可恃之器而陵不可測之淵其遇卒然之變有非人力可得而禦者不有神之智力以相左右其能克濟哉我元運東南之米取道遼海繚繞萬里而達京圻其亦逺且艱矣惟海神天妃有功於國與民者甚大舟入大海汪洋之中上天下水四無畔涯彼以眇然之身談笑而往無少怖畏疑慮之心以神賴也當大風疾至海水盡立雷電交下天日盡暝同舟之人對面不辨顔色窮蹙危殆呌號於神神之檣火􅂱如大星衆叩頭再拜舉手相賀如得更生其禦災捍患者此神之得祠亦宜矣神夙昔著靈至宋元祐間有功朝廷始立祠於其地聖堆厥後靈蹟日益顯赫凡東南並海郡縣悉皆置祠祀之䖍至國朝始錫祠額曰靈慈崑山周涇有靈慈宫大徳間朱公清所建也因肇啓漕道出入海水屢承神休所以表著靈蹟而為祀禱之地當漕發之期省臣及漕府長佐必躬祠下得從以行且祗奉上命具六牲以嚴祀事春夏凡四至焉皇帝嵗遣使函香賁臨徳意優渥曰是宜宫祠修潔完好幽以事神明以祗待王命至正十三年春今漕府長托音公始至祠下仰見殿廡榱瓦彫弊丹堊蕭瑟大驚曰是雖主祠失人亦有司之過也乃出公帑鈔計凡七千五百緡俾新之主祠道士楊春澤用掌葺治州郡長佐及逺近富人皆相先出錢以佐役未幾舊屋皆完復以殿之東北為殿以安神寢殿北為樓以弭使節至是宫之規制始備矣初祠之立實道士殷震亨主之震亨卒乏人以浮屠攝焉後至元間主以道士張徳一公乃訪求道士之賢且才者將俾之舉廢修墜因得春澤且以春澤實震亨之後遂使之主是宫且定為甲乙相繼無有變易而春澤之勤敏果能立事又足以彰公知人之明焉公盡心漕政彌滿周宻無有罅漏及其致力於神又復懇至且圖乆長及神相漕事卒底於寧雖其昭答國家典禮之隆然亦出於敬誠感召之故神人相與其亦可信也夫既記公事神之蹟又作迎送神之歌使嵗時歌以祀神其詞曰海之水兮實大以長妃旦出兮無方夕歸來兮故鄉閟靈館兮莆之陽編貝户兮珠房女窈窕兮在旁啾吹匏兮鼓簧飲且食兮樂康築遊宫兮婁滸敞高堂兮䟽户雲為車兮龍為馬妃倐忽其來下薦廣牡兮豐黍伐大鐘兮賁鼔方洋洋兮翟舞聊逍遥兮容與載羞肴蒸人􅆽酒兮我妃孔樂旡不有兮高濤山立大魚吼兮風吹𤣥旗䬃先後兮火流羣檣赤圓斗兮舟人如林命妃手兮嗟我欲留終不可乆兮崑陽鄭東譔濮陽呉睿書并篆額崑山州重修學宫碑崑山在宋為望縣學宫在縣治西南二百九十步元祐間縣令杜採之所徙建也國朝以生齒之庻陞州徙治所東倉至正丙申海冦毁東倉州復舊治所招還流逸民重立官寺及社稷之壇宓犧神農黄帝之廟至是遂大修孔子廟殿之址拓其舊三之一堂室門廡齋序直舍庫庾庖湢無不畢具又為堂以祀鄉先賢鑿池論堂以制象設先聖先師繪從祀諸賢範祭器理大成樂又無不如法實今費侯為州三年之所成也民之居者知有教士之歸者知有養又侯之仁民禮士一出於誠之所致也役始至正二十年夏四月竣事於冬十二月侯既帥僚友將吏儒先生講舍菜禮先聖先師又遣職於校者具書幣狀顛末走百里外謁予文以志予方悼世變之劇州邑鞠為草棘者雖鄒魯地不免矧阻江要海與冦爭尺寸者哉訖能保障其所如金湯帡幪其居廬校室如按堵之故非其人之守將雄才健政有以濟其民者曷致是耶若侯者是已𫝊曰守令者民之師帥也侯非師帥之殊尤者乎抑聞侯治暇即過黌宫與為弟子師者辨討名理扶植綱常者切切然恐不及人於乎人之所以為人國之所以為國者綱常也叙此則治斁此則亂世降道㣲邪説暴行滿天下馴致三綱淪九法斁人類無以别禽獸然理出於天者未嘗一息而可滅予讀孟子書知先王之學校之教矣其言於戰國之君曰三代之學皆所以明人倫也時方崇功利薄仁義則又告之曰未有仁而遺其親義而後其君者推其效可使制梃以撻秦楚之堅甲利兵人心天理之足恃也如此詩曰既作泮宫淮夷攸服是其效已又曰在泮獻馘在泮獻囚又知古之文武非兩岐也侯於是用武之秋不敢斯須㤀文教其不以是歟昔魯作泮宫國人有頌竊取其義而係之以詩云侯名復初字克明東平人賛其成者同知州事海陵梅英判官濟陽丁復初教授陶植提按控牘陳善都目沈繼祖謝安道也詩曰維呉支邑昆在北東東薄于海捍海作邦陵谷以變井邑以遷人民雞犬往而復還邑有庠序鞠為草莽治必有教復我黌宇展也費侯樂師克師文事武事匪曰兩岐在昔受成獻囚獻馘我教既成我戰必克化民服敵孰負孰荷侯曰噫嘻豈不在我我部百里我心一家衣冠儼雅籩豆静嘉天綱不斁國紀攸敘如子從父如弟子聴傅維昆有石維石有銘銘以著績聿觀厥成有元至正廿一年嵗次辛丑春正月上元日建訓𨗳陳増殷奎直學黄缺李詧學吏夏芑竹先仁奉訓大夫江西等處儒學提舉楊維禎譔將仕郎杭州路海寧州判官褚奐書并篆額記崑山州重修學宫記教民者民從治民者民訟是以學校重三代之際學校徧天下記稱國有學遂有序黨有庠家有塾其大畧可睹已予嘗考所謂校室之制則塾也即其所以督教之意遂使田廬民氓皆盡躬行孝弟忠信之行其效美矣及秦棄詩書不用學校遂廢至漢孝武時始復興學由漢以下每一改邑學輙隨而弛必乆而後復我世祖皇帝初定天下即使使東祠孔子復延致鴻儒大興禮樂文教之事民口為儒家復其繇役每詔下條序學校於是聖道彰明教化純美天子坐致太平之功學校不廢也崑山故大縣頃以户滿若干方陞為州後徙治益東東倉今州是也既遷有司作新學其制務侈於舊然來者弗察浸乆浸弛至正四年春今守王侯士英來見其蕪陋弗治曰不教民無以為治學廢教將安出夫國家隆學校所以樹教本也乃使修學宫上者棟宇下者步廡周垣靡不堅完又使士顧信相於論堂之北作新堂以為子弟講業問辨之地守以時入學則居於是使論説所受於師者以察其進否又鑿兩池夾室之旁中植蓮花曰是周子之所愛而為説以喻道者也因名堂益清是嵗學成而予適至入其境民有負老持幼望其邑而歌問之而曰前日為政者虐故去之日聞新守善養親又多善政是能養民者也吾故還耳余聞其言而歎曰斯近於仁矣能使其民親逰於其校士之居校者稱侯之美曰仁而不僣徭役貞矣亷而不苛盜攘息矣勤而不煩草萊闢矣予曰斯寛矣能使民遷善余嘗論之夫民易治耳道之仁而仁道之讓而讓設為學校教使皆盡躬修孝弟忠信如古之制其效亦無不著觀侯之於學善矣又能以身先夫民民喻其仁若依父母誠稱國家之明制庶幾知教矣昔者魯修泮宫而魯頌作重民彛也余願竊取其義因為詩以勸教民詩曰勾呉之東其縣維婁地大民夥陞取雄州州既改作民來如属不教則悍乃作新學學誠教首吏闇勿察彌乆而弛置若綿蕞守入伏謁顧瞻怵惕俄而大起棟隆且吉相作新堂使居絃誦更進弟子試為禮頌守謂弟子力學自躬毋苦征徭恣求良朋父兄圜觀歡喜忭舞執公之轡願之公所昔我避逃將子車下今絃於官進豆陳爼池水湜湜菡蓞其花錦紳縞帶容色洒如朂哉爾士有敬毋怠作室者誰守世傑氏李孝光譔崑山州重修儒學記崑山學校之難異於他郡有三故焉州之舊為縣故學校視縣為髙下縣既陞州而學校尚仍舊規制卑狹不足以聳觀瞻興士類其故一也又今州治乃舊太倉地地瀕海荒落其後日漸生聚成市蕃漢閩廣雜處混居而土著者十無二三文學之士亦率自他邦來今之舊𨽻儒籍者數不滿十人蓋民非土著則所向無恒心士非土著則所習無恒業其故二也又今之職教者非盡得人經術之不明行藝之未備不能正身檢下而且徇私以縱其奸是以螙愈深而弊愈甚此學校之通患而崑山為甚其故三也雖然事存乎政政存乎人其轉移作興之機亦存乎為牧守者何如耳至正九年夏史侯文彬來為守既謁廟庭即惕然思有以新之先是學贍空於計吏之手嵗所入無幾何入即隨手支付無所儲儲亦無其所侯命先作倉庾為屋者三翼其左右者二敞其前為軒者一凡向時之侵漁窺覬冐占儒額者悉去之節浮費謹出納明號令而是嵗之所入者始全所儲者始有餘此侯之所以立其本也乃履殿西偏地復侵疆三畆有竒築而為牆凡四十丈殿後地舊為汙池旦暮潮汐蕩激幾壞址乃募工輿土實汙池疊石以防河岸而為牆於其上此侯之所以廣其基也基址既固乃建講堂堂之高二丈三尺其入深五丈以楹數之者八其費出於州民陳允恭而凡畚築完甃之務則民之願輸力者聴蓋侯之徳惠政教足以動之故其樂於趨事如此若侯之自為與資於學廪者則更建大成殿為六楹髙五丈二尺深亦如之為儀門二楹如殿其髙視殿不及二丈六尺其入深三丈門東西為官㕔各四楹堂之東西為齋以居生徒殿之東西為廡以列從祀通為屋二十有六先是從祀諸賢並圖於壁翳昧陊剥弗彰至是始改為塑象凡百有五人其門牆亭泮靡不完好始於至正十年之正月而以明年二月成此侯設施之次第也侯之綜理規畫不啻若家事非有公府劇務不得已者必日一至焉若朝夕程督則授之教官前鄉貢進士蔡君景行景行亦孜孜展力以相其成於是授業者有師執經有徒誦聲洋洋達於閭里觀者易視聞者易聴而人心俗尚之變且權輿於此矣已而蔡君述其本末以來請為記予前佐領江浙儒學所記學校多矣然因仍者易為力改創者難為功今斯學内外髙深横縱巍焉廓焉跨軼前代非力足以任重才足以立功者不及此雖然予嘗徴郡乗所載人物自晉二陸而下多名士然猶曰才華過實君子所不取如清慎超卓仁義不汙者率有其人至近代端拱迄咸淳科第相望為鄰邑最其間又以大魁為朝名卿抗䟽力詆權貴者清節凛凛照映史冊為閭里重州治既垂四十年商賈之集生齒之繁財殖之富皆有加於在昔而人才之見於世者猶有愧焉此其故可知矣今侯一舉而新之所以嘉惠士子者甚至為士子者盍亦以侯之心為心以聖賢之學為學為小學而必由乎洒掃應對進退之節必由乎禮樂射御書數之文為大學必由乎格物致知誠意正心以修其身必明乎治國平天下之務以達其用師以是為教弟子以是為學夫如是則徳成於已名揚於後時居則善其鄉以成禮讓之風出則廣其施以著之行事之實上以忠於國下以有光於前聞人夫豈非史侯之所望於諸君者哉史侯為州所増廣創設不可殫記予獨舉其作新學校之功以為州之士子勸無負侯之盛心云承務郎前浙江等處儒學副提舉李祁譔武畧將軍建昌路縂管府判官胡布書并篆額至正九年夏史侯文彬守崑山始新州校規州制也浙提舉李先生祁為之記史侯去而碑未剏至至正廿二年春基分教是邦始奠祠而立焉太守偰侯實董成之嗚乎史侯建學功非一日而數年間始得刻石庸非政教有所闗係而史侯之勤終不可泯耶明年夏平江路崑山州儒學教授江南蔡基志啓聖廟新建宗魯書塾記宗魯書塾者松江上海之士民因孔氏之遺蹟而作也遺蹟者何孔子裔孫有仕於東南者僑居於此故名其地曰孔宅涇也涇之東十五里曰青龍鎮青龍又南六十餘里曰華亭此其地之所在也按圖經孔子二十二代孫仕漢為太子少傅曰潜者避地㑹稽卄九代孫曰滔者仕梁為海鹽令三十二代孫曰嗣哲者仕隋為呉郡主簿三十四代孫曰恒者為蘇州長史孔氏仕東南者非一人厯嵗滋乆不可必其主名也舊訪其地有孔聖廟顔淵井宰我墩涇之北有浦曰叔梁浦立有叔梁廟後因追封又名曰啓聖王廟蓋孔氏乆居其地或值世代分據阻絶思慕其鄉作家廟進祀故涇曰孔宅浦曰叔梁而井若墩皆以弟子名者實以擬夫東魯尊其所出而不㤀其所自也又傳孔聖廟嘗廢為孔宅寺㤗定中廡下有異聲寺僧掘其地得舊時冠履等物土人益信其為孔氏所居矣至正嵗戊子前延平路教授章顔青龍人也家素饒財樂善尚義睹兹廢址名存實亡乃擇廟東隙地乗地爽塏而營治焉傭工市材載堂載構並建兩禮殿右祀啓聖王叔梁氏及夫人顔氏左祀宣聖及從祀四賢十哲兩廡列祀濓洛新安等傳道諸大儒象設尊嚴規制宏䆳南院門二北祠文昌講集有堂肄誦有齋東曰進徳西曰修業黌舍粗具兵難荐熾寢不遑理後十有二年嵗庚子興化馬玉麟尹上海訪知其故時章顔已死召其子弼輔喻之曰汝父搆是而中輟何居乃畀禄米以助不給弼輔割田六頃八十餘畆嵗租米為石三百五十以資釋奠舍菜養士及器服百用之費於是走幣致前信州藍山書院山長劉鏞以主之設訓𨗳二人曰洪恕曰韓羽以教弟子員直學一人曰王黼以司出納漸有條序而馬代去海陵何緝為尹申勅前規免章氏所舍田役以優其家松江倅顧逖亦遣功曺董工甓壇築垣以補完之有頃顧與何又皆罷去嵗癸夘秋維揚蘇宗瑞尹上海而缺張憲文為丞天臺陳聚為簿暨缺職黄佑胡紹忠協恭敷治振厲士風躬履書塾𨗳飭惟恪慮昧於永乃命山長劉鏞具因革匄文以刻石焉惟禮莫大於祀治莫先於教祀以致敬教以迪善能敬而善俗斯厚矣古者鄉師州長属民讀法㑹射考其徳行道藝以糾戒其過惡祭樂祖於瞽宗以示不忘祀之與教其來尚矣聖人之教本於道道原於性性旡不善則道無不在教無不行也吾夫子生於叔世不得其位孜孜然修明經籍垂世立教使天下之人知有人倫而不淪於異類千萬世如一日則天地父母之徳家祀户享未足以報也况是地也聖裔居之嘗建家廟矣事跡有徴廢而不興見者聞者寧恝然耶郡邑大夫士先後勸戒建置一新爼豆斯陳弦誦斯秩洋洋如在濟濟來㳺可謂知所務矣於以崇徳報功於以化民成俗其效豈淺淺者名曰宗魯以表其跡不亦宜乎昔子産不毁鄉校孔子仁之諸君子之興書塾得毋有以稱述之耶於乎道若大路然人病不由耳師弟子業於是者溯夫淵源之正而不汙流是溺識夫體用之全而不邪徑是惑是則聖所望於後學邑大夫所望於俊乂者將羣游於書塾涇浦者如周旋於闕里沂雩之間自是呉多君子使人曰呉一變至於魯顧不休與至正癸夘冬中月既望資善大夫江浙等處行中書省左丞周伯琦記並書篆崑山州重修三皇廟記稽古鴻荒之世人文未開蚩蚩之民與鳥獸争一旦之命不有聖人出而立人極焉生人之類滅乆矣毛茹而血飲也為之庖厨巢居而穴處也為之宫室畫卦以通神明之徳造契以代結䋲之政為之耒耨以厚其生為之醫藥以救其死造律厯垂衣裳以開萬世之治其有功於生民甚大廟焉而棟宇撓祀焉而籩豆缺豈教民報本之意哉崑山三皇廟自州治遷後日就隳廢至正十九年州治復還舊所大尉缺承制以安卿石君同知州事奠謁之初顧瞻太息退而謀諸知州費侯曰州事草創百廢宜次第舉三皇建極之始今而廟宇崩摧神象暴露國家崇奉之意安在耶舉所宜先費侯是其議亟捐俸為倡醫流義士翕然和之不數日得錢若干緡米若干石召匠度材以工給其役以吏董其事不數月殿宇之顛覆者隆然起兩廡星門之朽弊者翼然張階墀磚級之陊剥者整以宻象塑丹白之漫漶者煥以新傳所謂人存政舉者是也夫弛張係乎理不係乎時廢興由乎人不由乎數有為者何施而不可也學有田若干蕩租若干冊籍迷失無所考石君又追究歸之學祭祀饘供之用於是乎不窘矣廟成而石君去費侯曰石君之善不可沒也徴予文記之予讀邵子經世書至皇帝王霸未嘗不廢書而嘆也皇以道化民霸以力服人世降俗漓古道茫昧崑山之長貳修舉廢墜而以三皇廟先焉其薄功利以尊道徳者耶其知報本而善教民者邪詩云有斐君子終不可諠兮後之人庶乎尚有考也費侯名復初字克明東平人石君字安卿西夏人陳秀民譔饒介書余詮篆額至正二十三年夏月日平江路崑山州知州偰斯同知州事郜肅州判丁克明提控按牘趙從周都目謝𢎞道醫學權教授王􅓮教授許規立名蹟録卷一
