body:
  text: 名蹟録卷六明朱珪編附贈言贈朱伯盛詩序士不用于當世必有託焉而𨼆者雖一藝之㣲一事之卑皆不恥為之故往往有託于農圃巫醫商賈羣工之中蓋惟求其可以自晦而已又庸計其髙卑可否而後處其地哉吳郡朱珪居婁江之旁無他嗜好獨喜周籒秦斯篆畫之古取石鼓嶧碑之文習之既久而盡悟其法因善為人刻印賢士大夫多就珪求刻焉珪之言曰吾聞位髙者身危禄富者憂大名盛者毁隨彼有自始壯而仕至髮落齒脫而不知止及其遭疑忌而廢斥觸刑辟而戮辱于是時也則雖深咎極悔已無及之矣今吾耑吾意于篆畫唯求其無部分之失旁從之譌而無戾夫古人制作之義吾過亦寡矣若珪葢有託焉而𨼆者歟永嘉李孝光吳郡張雨作詩以貽之珪不絶于當世賢者則其為人又可知已故予系之以序至正十四年四月昆陽鄭東書知君用意出雕蟲自較明牕小篆工争鑄方銅刻私印姓名僅了百年中張雨舞鳳蟠螭追逺古雕鏤纎妙入秋毫佩身可比玉剛卯贈汝愧無金錯刀李孝光子刻印如刻秋濤轉摺變化手縱操􅝻匾神凝李斯篆肻綮妙悟庖丁刀漢章舊制蟠龜鈕魏武新書虎豹韜太史周南縱留滯劍文仍欲洗金膏鄭元祐煒煌金石刻鬱崛蛟螭文猶遺姓名在蕭然秦漢分寶玉道幾息瑰奇㪚如雲朱翁業古藝千古揚清芬雲林生倪瓚門前索印索如逋一榻西山對酒壺池看科斗春波活樹養珊瑚雪影扶縱有黨碑名肻附只躭竒字手親摸幽居巷裏時相見清比詩人骨更臞郭翼神斧磨天割紫雲仙葩殞玉發竒芬靈書寶訣開剛卯不數人間小篆文畫刻輸君總色絲前身想是伏靈芝虎頭食肉元无相鑄鈕休傳左顧龜我家金粟道人章瓦欵蟠螭識未央千古典型今復見佩之何必獸頭囊鏤玉鍍金與錯銀盡將工巧失天真君能獨掃雕蟲伎定品當年合入神伯盛朱𨼆君予西郊草堂之髙鄰也性孤潔不佞于世工刻畫及通字說故與交者皆文人韻士予偶得未央故瓦頭古泥中伯盛為刻金粟道人私印因驚其篆文與製作甚似漢印頃又以趙松雪白描桃花馬圖鈎勒于石精妙絶世大合松雪筆法惜其不得從遊于松雪之門使茅紹之專美于今世因題四絶于卷末以美之伯盛勿以予言為譽後必有鑒事者公論也至正十七年中秋日書于玉山草堂金粟道人顧阿瑛書朱生心似鐵篆勢藝彌精應手多盤折纎毫不重輕么麽形獨辨􅝻匾勢初呈漢印規模得秦碑出入明風流金石在潤色簡書并餘刃庖丁解風斤郢匠成達觀應自我賞鑒足平生趣刻無多訴因君託姓名陳世昌白首耽書更不忘鵠文蟲篆爛生光髙人為賦峩冠石太史曽題琢玉坊野屐踏雲閒訪竹春簾迎霧静焚香别來又泛松陵櫂𣺌𣺌輕鷗江水長盧熊少林心印元无文刻雕無乃傷其真太樸未分親見得伯盛妙手何超倫千聖頭邊不一印猛虎插翼龍奮迅疾燄過風正令行不妨堪作如來𦙍釋清欲西祖傳心不以文伯盛用之心更真印空印水印泥也左旋右轉世絶倫銕牛之機即此印石火電光何足迅得之于手應于心聚螢讀書笑車𦙍釋智寛方寸鐵錢逢篆方寸鐵志吳門朱珪氏師濮陽吳獻大小二篆習既久盡悟石鼓嶧碑之法因彚為人刻印遇茅山張外史外史錫之名方寸鐵持以過錢塘訪予于吳山次舍求一言白其所謂方寸鐵者予笑曰予方以鐵石心取乖于世而子又欲乖我之乖乎雖然古之豪傑修已治人者必自方寸鐵始黄金白璧可磨此鐵不可磨也予以是鐵印諸金玉銀鋼犀象使佩之者皆无媿于是鐵外史氏心印之教行矣豈直無悖于篆畫无戾夫古制也哉今一妄男子釋蹻起閭巷取封侯印如斗大咫尺書駈役帶甲百十萬如金翅鶚逐百鳥无一敢後者金印之權重矣哉吾不知果能為天子剪狂冦佐中興為生民開太平无愧于汝鐵不則徒以苟富貴不至腐屍滅名不已使得珪方寸鐵印斯可以䝉金斗而夀榮名矣珪或為今將軍刻符印其亦以是告之至正十九年秋七月八日李黼牓同甲進士今奉訓大夫江西等處儒學提舉楊維禎志方寸鐵銘婁東朱珪字伯盛工古籒篆文其于六書之義攷之尤詳嘗以餘力刻印章則為中吳絶藝間遊錢塘遇句曲外史張雨名之曰方寸鐵盖以喻其能堅其志操期以進乎道亦若桑國僑志于鐵硯之鐵云雖然科斗書廢已久必以篆籒為師法漢𨽻而下不足論能復其古其庶幾朱君乎朱君與予相游從知其志操之日堅今年予來玉山中聆朱君之書法益有進是猶張旭悟公孫大娘之舞劍器也見其刻玉石如切泥則又若漆園自誇庖丁解牛而得肻綮也張得于舞劍庖丁得于解牛吾知朱君得于書而悟外史方寸鐵之㫖矣遂述其事而為之銘銘曰聖人作人文開龍馬出榮圖來神農氏尚結繩民勿犯俗厖淳史蒼頡肇有制譬孳乳乃曰字越夏商厯周秦科斗廢籒篆臻漢而晉書變作唐風媮政日惡曰逮今邈寥寥事刻畫昆吾刀鍾鼎隳石鼔頽心太苦婁朱珪至正庚子夏四月二十六日河南陸友仁造天地為爐隂陽為炭鑄方寸鐵非柳下鍛剛不可屈堅不可磨侯剛侯堅利用實多仝欲以之刳食月蟲璟以執諫剛過于崇惟善用者為衡為權稱物平施錙銖勿偏嗟爾有此獨藏于宻以桑之硯改而為筆摛詞琬琰百鍊其工剔去魚魯斯文有功彼寸鐵兮人孰無之欲偉其器繄鑪與錘寧小為錐勿大為錯凡百君子勿由外鑠毘陵謝應芳方寸鐵頌繄方寸鐵嫓昆吾刀游刃發硎妙契縱操六書奥㫖探賾捐勞史籒秦斯作則孔昭翔鸞翥鳳騰龍騫蛟為印為章奎璧麗霄文苑藝林世賴崇褒我頌匪私永言不佻至元庚子八月十八日淮海秦約造詩朱君手持方寸鐵橅印能工漢篆文并剪分江龍噴月昆刀切玉鳳窺雲他年金馬頻承詔此日雕蟲試策勲老我八分方漫寫詩成亦足張吾軍至正辛丑八月朔平湖草堂中寫隴右邾經蒼頡製書觀烏跡白日能令鬼神泣何如朱生手中一寸鐵文章刻遍山頭石山石可移心不移生精此藝將奚為生言平生苦心力過客摩挲那得知願將此鐵獻天子為國大刻磨崖碑為國大刻磨崖碑盧陵張昱人心何危患多岐方寸之鐵貴自持百鍊耿耿明秋暉彼柔繞指惟詭隨朱盛明勁真吳兒法書鐵畫過李斯晴窻握管儼若思學成變法出愈奇鐵耕代筆猶神錐用之切玉如切泥孤忠不媿月食詩清便更賦梅花詞元祐黨碑我所非驢鳴犬吠吾所嗤雕蟲小技用兒嬉屠龍妙割嗟奚為盛乎缺知不知北南車馬得得來大書深刻磨崖碑至正二十年庚子歲夏六月初吉天台氏元鼎造袖裏昆吾一寸鐵江南碑碣萬家文玉符金印雲臺將大篆煩君為勒勳雲間陸居仁十年兵興遍天下石山大火羅浮野野火燒盡秦漢碑咸陽鬼哭無人打故人吳睿業篆𨽻好古乃有如珪者妙刻金粟道人章尤工白描桃花馬金印徒聞如斗大零落當時建章瓦君不見黄鶴仙伏靈芝北海久長髙聲價武夷山樵者錢惟善題于海嘯軒静寄軒詩三首静寄軒中無垢氛研苔滋墨氣如雲匣藏數鈕秦朝印白玉蟠螭小篆文獨行應如魯獨居心同栁下孰云迂從教隣女衣沾濕試問髙人安穏居身似梅花樹下僧茶烟輕颺髩鬅鬙神清又缺孤山鶴瘦骨伶仃絶愛憎雲林子朱伯盛甫小像贊游乎古六藝之林業刻符而工摹印善學魯獨居之男子身不娶而能忍貧飲沆瀣而為漿友寂寞而與隣瘦骨昻藏老鶴精神善追踪西塞山前之漁寄迹桃花源上之民者歟辛亥十二月倪瓚書臞然如昨秋風野鶴老矣于今孤雲逺岑軌有道之躅不娶終身何身之卓求古人之心不刻黨碑何執之深吁此其所以傲兀乎變化吁此其所以膏盲乎山林華亭殷奎製印文集考序摹印之法六書之一也徴諸史傳其制作之大略可睹已自唐以來人不師古私印往往繆戾至于近世極矣大德中魯郡吾子行父因六書之學畧舉其要而人稍稍趨正先生與承㫖趙公又各集為印譜可謂信而有徴也鄉人朱珪篤志于古嘗從錢塘吳睿師授書法凡三代以來金石刻詞靡不極意規傚暇日又取宋王順伯并吾趙二家印譜旁搜博取纂為凡例并吳睿等所書印文及自制私印附焉名曰印文集考間以示予予謂私印之作固書學之一事為士大夫者罕習知之而況上窮蒼史神明之奥以通造化之原者哉宋宣和間嘗修博古圖至于鏡鑑泉貨之文亦頗著録然猶未采印文也至王球嘯堂集古録昉有之近世曹南吳忠淳刻學古編僅存古印數十而莆田鄭􅋫又集印文七十餘鈕模刻傳之名曰漢印式所撰序畧无所依據繆為廣博之詞而失其要領又自以所制附後舛謬尤甚其稱唐張彥逺宋李伯時王子弁近時吾子行失其本又不知何說也大槩前人志于存古所輯不能無醇疵其多者既不能廣傳而簡略者又無以考信千載之下又孰能辨某印為漢魏某印為晉唐而當時作者豈盡出于蔡中郎李少温之流乎苟非識見之博考訂之審使玉石錯雜涇渭混淆如鄭􅋫之繆者亦何益哉今朱君所著黜其背戾存其簡約集為成書誠篤志古學而有益于當今然蒐輯有年適值兵革頗有㪚佚識者恨焉今所存若干篇釐為一卷貽諸好事俾予序首珪字伯盛清淡寡慾五十不娶翛然有出塵之志永嘉李季和清河張伯雨會稽楊㢘夫昆陽鄭季明咸所嘉尚云至正廿五年乙巳秋八月朔吳郡盧熊書印文集考䟦今世士大夫名印謂之圖書即古人私印其制吾竹房三十五舉言之甚詳然未有關世道處如漢人以五字為例豈無所例乎國初制度未定往往皆循宋金舊法至大大德間館閣諸公名印皆以趙子昻為法所用諸印皆陽文皆以小篆填郭巧拙相稱其大小繁簡儼然自成本朝制度不與漢唐金宋相同天厯至順猶守此法斯時天下文明士子皆相倣傚詩文書簡四方一律可見同文氣象甲申乙酉間予在太朴危先生家始得江右吳主一所鑄印文曰危氏太朴曰臨江危氏用于文字之間皆是陰文不用陽欵名曰漢文印章有不合此法者謂之不知漢法不二十年天下不謀而同皆用漢印矣甚至搜訪漢人舊印如關内侯軍司馬部曲將印别部司馬冠軍司馬等印用于自已名字之間以為美觀以為博古殊不知以今人而為漢人居今官而佩漢印不祥為甚且陰文屬兵象漢舊印又皆用武之印尤為可怪數年之後天下紛紛多事朝廷用武文士皆出總戎被介胄縣將軍印綬不復優游文事矣右附廣東觀餘論押瓦部所論朱伯盛好考古篆籀之學與同郡錢翼之父子及陸友仁吳孟思盧功武講論甚博尤善倣古名刻及士大夫勒名金石儼然三代制作氣象予為之言此使知其勢雖若緩而可以觀世道之變雲門遺叟張紳館閣諸公無不喜用名印雖草廬吳公所尚質樸亦所不免惟揭文安公絶不用其制吾竹房論著甚詳然其所用却又不合作趙文敏有一印文曰水精宫道人在京與李息齋袁子方同坐適用此印袁曰水精宫道人政對瑪瑙寺行者闔座絶倒蓋息齋居慶夀也鮮于郎中一印曰鮮于伯幾父吾子行曰可對尉遲敬德鞭滑稽大約相同子行嘗作一小印曰好嬉子葢吳中方言一日魏國夫人作馬圖傳至子行處子行為題詩後倒用此印觀者曰先生倒用了印子行曰不妨坐客莫曉他日文敏見之罵曰箇瞎子他道倒好嬉子自太平盛時文人滑稽如此情懷可見今不可得矣予座主張先生仲舉在杭一印曰平臯鶴慶叟葢用杭州三山名臨平臯亭黄鶴也古人亦有如此竒者如雲烟過眼録載姜白石印文曰鷹揚周郊鳳儀虞廷葢以其姓氏作𨼆語辛稼軒印曰六十一上人又以破其姓文米元章書史言劉注印曰劉巨濟符符字亦好奇耳雲門山樵張紳書朱伯盛印譜後字原表目跋右朱珪所摹吳孟思篆書字原暨說文表目也孟思嘗為胡膺寫說文解字一部既成且謂託熊分註其下今書藏吳氏然猶缺其注字未完珪愛其篆法摹此五百四十字求予小楷補綴其間因為改正譌誤珪嗜古好學予于古今印文序言之詳矣兹得以畧武寧盧熊記字原音訓跋吳郡朱伯盛讐校字原音訓授其甥孫延年講習之求予繕寫成帙其意倣郭忠恕石本凡例蓋忠恕用少温所修而伯盛一依說文定本其用心亦厚矣後之覽者毋以淺近而忽之南昌盧熊記題朱伯盛所藏吳孟思書三體心經禇河南書心經石刻所傳今亦罕得予嘗一見可謂佀人者喜況親御翰墨迹耶孟思以鐘鼎篆𨽻三體書心經嚴勁清潤有商周秦漢之遺法吳朱珪氏工篆字故孟思寫此以贈珪當為入石傳諸後世詎不以河南視之也嗚呼珪氏為吾寶之河東張翥書于武林史局世間精妙之物見者莫不撫玩嗟賞何者其立心不苟則其勢久而必精物之精者擬諸造化夫孰能少之乎此卷備三體而各臻其妙非與一世周旋于法度之中不能及也吾鄉自禇河南後能書之士鮮克擅名今得吳睿篆𨽻自當出色前有張叔厚白描觀世音像併為二妙宜珍襲之得其卷者婁江朱伯盛氏至正辛丑重陽後一日錢塘陳世昌書于禾興水西寺之寓舍爽溪樓右濮陽吳睿孟思所書三體心經一卷梵義𢎞深間不容喙所可議者古文欵識見之三代鐘鼎大篆見之周石鼓秦權斤度量漢𨽻最廣惟蔡中郎石經深可師法後世宗尚不一務竒成怪變雅為俗無復古人渾厚氣象豈世道日趨下歟良可愍已予聞孟思先人玉溪翁好游其家故多秦漢石刻用力既久色色精詣自吾竹房趙松雪虞道園以下便為第一手崐山朱珪𨼆于方寸鐵蓋亦黄鶴仙伏靈芝之儔也寶藏此卷不以輕示人宜及其目力勒諸堅珉以傳好事亦盛德者之用心也金粟道人尚克相于成焉隴右邾經拜手謹書摩訶般若波羅蜜多者梵語也此翻大智慧到彼岸心也者即一切含生本有靈覺之性也迷之則永沉凡下悟之則遽為聖賢觀自在菩薩者即能行此而悟明之人也以是而度一切苦厄者即到彼岸之時也此經流通末世書寫受持若家喻而户曉求如吳孟思之筆端三昧則不可得矣後世閱是卷者或能因公之書而能了悟此心如睡夢覺如蓮花開朗然凡聖悟迷之表則孟思之書不虚設矣至正廿一年二月十五日南堂沙門清欲拜題予友朱君伯盛精字法悟空相故濮陽吳孟思為書三體心經以贈前有淮海張叔厚白描觀世音像引首久欲題識而觀其人適與予同訪了翁菴禪老伯盛出此卷一見而了菴言下意會即拈筆一一重為指出信當世之三絶也伯盛又欲予證明予以久交不能固辭強于心上加一轉語製成二偈云斬釘截鐵畫虚空三體分明一體同讀得正中無一事蓮花開在海當中當心一畫到如今畫畫皆心不可尋盡說朱珪精字法看他那畫上求心金粟道人顧阿瑛焚香為說書以為識五藴皆空空亦空悟迷雖異此心同當知自在能規照不落尋常影象中點開心畫古如今未點之先作麽尋拈起筆端小三昩方明無相本來心奉次金粟道人韻再題南堂遺老清欲崑山黄應龍嗜古好學所畜奇書異傳并一時典故與予同所好也去冬寓崐僧寺一月與應龍日相接論因借此名蹟録一編歲久蠧簡不敢託諸人遂手録之連序目五十三紙成化二十二年歲次丙午三月廿一日小樓記吳郡朱存理性甫名蹟録卷六
