  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0028_WYG_005-1a, image: WYG0683/WYG0683-0078a.png}
body:
  text: 名蹟録卷五明朱珪編雜刻快哉亭帖軾頓首昨日快哉亭與數客飲至醉才歸辱簡不逮即答為愧春生雪未計尊體起居佳勝新詩甚清刻病酒不敢率易趁韻幸少寛限否因書見過如何如何不一軾再拜忠玉提刑執事拜石壇記瑛素有石癖凡過廢園壞宅見奇峰怪石輙徘徊顧戀不忍捨去或有計求之不得者必圖寫其形似標諸草堂壁間以為几格供後至元戊寅四月下澣訪竺僧巖叟于東城之菴菴即故宋周太尉宅斷垣之外燕麥中有假山在焉遂披蓁納棘褰衣而登其上羅立諸峰已為好事者挽載而去獨有一石似壁而失其左股卧于髙梧之下有老坡題識觴詠之語易之以粟歸而立之中庭左映右帶無非松竹芭蕉枇杷之屬多有書帶草耳石之挺挺拔拔如老坡獨立于山林丘壑間愈見其孤標雅致也瑛加之拂拭永為子孫珍玩明年奎章閣鑒書博士丹丘柯敬仲下訪見而竒之再拜題名而去丹丘詞翰鑒博有元之元章也于是砌石為壇字曰拜石後三月而御史巴延達兼善來觀嘉柯之逸遂為作古篆拜石二字于壇又𨽻寒翠以美其所此石之名由是愈重然皆未知所紀之詳至正乙未之冬周履道秀才自梁鴻山攜贈老坡手帖讀之乃是答忠玉提刑快哉亭飲後者上有賈秋壑私印其詞與紀石甚肖嘗記大全集中有次王忠玉遊虎丘詩有連日與王忠玉諸公遊西湖次韻詩有次劉景文答馬忠玉詩葢當時有兩忠玉焉然莫知其孰是及攷宋史元祐四年坡為翰林學士兼知禮部以論事積當軸者恨故請外拜學士龍圖閣知杭州以避朝謗也瑛想老坡風流曠邁行千里間有名山勝水豈不與友朋醉酒賦詩以佐其意乂攷諸雜録忠玉乃王規夫姪孫先坡在維揚後坡渡江老坡答其詩有及君未渡江過我勤秉燭之句是則書所寄者王忠玉無疑也然後知石乃維揚故物帖則王忠玉家寶也吁石之在山不知其幾千萬年因坡之題鑿而出山者又不知其幾百年帖之夀又非石比兵殘火燬展轉流落人手者亦不知其幾百年今一旦二美併來抑神物有所會合耶吾玉山有所際遇耶又思丹丘巴延不二十年皆仙去坡仙有靈豈不能于風清月白之夜挾二公同逍遙于此壇乎瑛亦豈不能摘古玩酹一尊于此壇乎不因此石其能永傳敬書此記俾伯盛朱茂才刋于他石使後之覽者知石與帖并拜石之壇有所自來云至正丙申正月五日金粟道人顧阿瑛書于玉山草堂竒石銘厥色斯蒼厥質斯剛元氣胚渾陰陽互藏有嶻髙華倬彼太行勿伏為虎勿起為羊說法點頭扣之庚庚大蘇之誌海嶽之狂異世同符拜為石兄永千萬年鎮兹玉岡河南陸友仁製題拜石壇詩眉山三蘇宋儒宗長公矯矯人中龍南遷儋耳西赤壁文章光燄超洪濛快哉之亭雪初霽領客登覽山川雄自云平生不解飲胡乃一舉觥船空和詩寛限見真率鑿崖題石摩蒼穹功名富貴一丘土斷碑殘素傳无窮吁嗟神物人所衛玉山合璧俄相逄奎章博士丹丘翁江南放逐驚秋風見之即下米芾拜二顛癡絶將無同築壇山中加愛䕶樹以松桂連椅桐雨窓雲户潩寒翠朝闌暮檻開青紅白野御史龍頭客青年獻賦蓬萊宫戲將脫頴寫􅝻匾新釵折股星流虹只今烽塵暗河岳王侯第宅皆蒿蓬牙籖玉軸映竹素好事獨傳吳顧雄婁東朱珪鐵作畫字字玉屈蟠蝌蟲嗟哉昔人今已矣慘淡故國風煙中如何二子復嗜古策勳墨妙收奇功我來拜石重太息蒼蒼古雪吹長松登壇絶叫浮大白酒酣目送飛孤鴻汝陽袁華好事久傷無米顛清泉白石亦淒然快哉亭下坡仙友拜到丹丘三百年拜石壇主顧阿瑛製金粟道人小像贊謂其有意于榮進與詠歌彈琴誦古人之書謂其濶畧于世故與能擴先世之業昌大其門閭逍遙户庭名聞京都忽自逸于塵氛之外駕扁舟于五湖性印朗月身同太虚非欲會𤣥覺于一致而貫通於儒者耶倪瓚造戊戌八月法喜精舍北樓儒衣僧㡌道人鞋天下青山骨可埋若說向時豪俠處五陵鞍馬洛陽街顧阿瑛自題爽溪樓詩殿閣連雲接爽溪鐘聲逺與鼓聲齊長安若問江南事報道風光在水西右唐宣宗避地所作周伯琦為僧克新書戒石銘爾俸爾禄民膏民脂下民易虐上天難欺黄山谷書崑山州知州史文彬重立天蓬贊粤始天造孰形以隆範形一定天協于公維形匪形萬有不同帝所之聖其魁曰蓬作帝良能賦此異躬部以丁甲雷聽風從扶竪忠順剔除妖㓙闢翕陽陰和合雨風斗應喉舌彗伏梧衝丹霏夾日紫氛流龍祝釐弟子受法靈宫畀汝心印罔感不通太上弟子張天雨發香臧宫弟子楊維禎造吳睿書竇諫議陰德録跋竇諫議種德之厚既身享富夀而又獲五子俱顯之報由是觀之天道福善其可誣乎文正范公悉録其事葢為天下後世勸也今刻斯文以廣其傳使人人得覽而興起為善之心亦世教之一助也元統二年歲次甲戌春華陽思義識太原王時書濮陽吳睿篆額梅谿說梅谿者沈長卿自號也長卿因宦游自越而吳僑居甚久不逺數百里致書于予以其自號者求予為之說頃予起于既老承乏詞林年侵學落無能為役納禄而退五載于兹諸公貴人莫不上體朝廷閔其衰耄放令還山之意未嘗横加虐使邇輕薄小子偽為予文者所在有之俗筆无知但喜其獻䛕取媚而甘受其欺罔長卿不察遂疑予尚未焚筆硯猥以此見驅役予年垂八袠氣息奄奄安能效三五少年東塗西抹為人作春妍乎雖然長卿之來意則已勤不可以不答也昔永嘉王公龜齡自號梅谿王公狀元及第厯侍御史至太子詹事為時名臣其文章事業海内之士無不斂袵心服先儒朱子尤敬仰焉所撰梅谿集序稱其光明正大疎暢洞達求之古人惟丞相諸葛武侯工部杜先生尚書顏文忠公侍郎韓文公參知政事范文正公五君子可以為之比其髙風盛烈逮今二百年猶凛凛也長卿翺翔于仕途見其進未見其止俟他日至王公地位然後挂冠而歸從容領畧梅谿之上攬幽芳挹清流詠水部之詩誦廣平之賦而和以武夷之櫂歌彼士大夫嘖嘖誇詡曰彼亦一梅谿此亦一梅谿王公不得專美于前矣奚必太早計而求予之說為王謝争墩古今佳話有為者亦若是長卿勉之予之說止于此長卿或以為然則姑附于卷末幸勿謂予前言戲之耳至正甲午八月朔旦金粟山樵者黄潛撰封禺山樵吳睿書實際川禪師影堂逸事余觀永懷重修記所謂行人道川者玉峯狄氏子始為縣之弓役聞東齋謙首座為道俗演法遂從之習坐因上元郎官欲空其獄張燈縱市人遊玩以罪囚繫于狄家狄謂囚曰汝曹欲入市觀燈乎囚喜狄悉縱之囚竟逃去明日聞于官尉怒笞之狄于杖下大悟去依永懷剪髮為頭陀未幾主僧遣之至江滸市木建諸天閣木商問市木何為曰建法堂諸天閣商扣之玉峰有狄押獄今在否狄笑曰我是也商羅拜之曰公我輩恩人也蓋衆商昔日羣囚也商曰我當以建閣材木報公之德一日送至公歸勿言至期狄出視寺河左右皆巨木也閣由是而成始者建閣之意中為井闌諸天環繞其上下安寶華玉座為住持者升堂說法以表諸天之空中拱聽也閣成狄復依謙於東齋謙為改名曰道川且曰汝舊呼狄三今名道川川即三也此去能䜿起脊梁了辦箇事其道如川之増若放倒依舊狄三矣川銘于心建炎初道川遊方至天封參蹣菴成禪師機鋒投合菴印可之復因東齋道俗欽敬有以金剛般若經請問者川為頌之今盛行于世陰興間殿撰鄭公喬年漕淮西適無為軍冶父虚席命川開法一香為蹣菴供冬至上堂云羣陰剥盡一陽生草木園林盡發萌惟有衲僧無底盔依前盛飲又盛羮川號實際加泰普燈録載師為僧出世因縁不載永懷建閣之事而建閣一段佳話予聞之于覺齋王真人非妄傳也予參合普燈與王真人所傳以為川禪師影堂逸事若入在記中詞繁文夥只收為逸事則不失禪師建閣之功德也今岳雲望禪師一新梵宇豈非川禪師之再來也望乃靈𨼆普覺獨孤禪師之子予之猶子也至正九年己丑仲秋前玉几松月道人正印書時年八十有二秘閣銘秘閣銘右軍書大舜琴一腕之力汝所任盧熊篆簫銘截翠蛟于渤澥吹紫鳳于崆峒起一緒之要妙宣八風於神宫東維叟製王時篆鏡銘資爾融明合禮頌美與厲惟其公毋物以室无垢以䝉嗟爾之用唯有終鄭東造吳睿書篆拄杖銘九節杖得之婁江之上其日己未癸丑仲夏員丘岌嶪兮雲而在下噫我與爾俱變化倪瓚造盧熊篆名蹟録卷五
